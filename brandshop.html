<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Betting Exchange Room - Official Shop</title>
    
    <!-- Preconnect per caricamento istantaneo di font e bandiere -->
    <link rel="preconnect" href="https://flagcdn.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================
           RESET & VARIABILI (TEMA DARK/YELLOW)
           ========================================== */
        :root {
            --bg-color: #000000; /* Sfondo Nero Puro */
            --card-bg: #0a0a0a;  /* Sfondo Card leggermente più chiaro */
            --text-main: #ffffff; /* Testo bianco */
            --text-muted: #9ca3af; /* Testo grigio chiaro */
            --accent-color: #FFD700; /* Giallo Oro vibrante */
            --accent-hover: #e6c200; /* Giallo più scuro per hover */
            --btn-text: #000000;    /* Testo nero sui bottoni gialli */
            
            /* Effetti Glow */
            --glow-accent: 0 0 20px rgba(255, 215, 0, 0.4);
            --shadow-card: 0 30px 60px -15px rgba(0, 0, 0, 1), 0 0 30px rgba(255, 215, 0, 0.1) inset;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        /* ==========================================
           LAYOUT GLOBALE E SFONDO
           ========================================== */
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: clamp(1rem, 4vw, 2rem);
            
            /* Motivo di sfondo geometrico sottile in giallo/grigio */
            background-image: 
                linear-gradient(45deg, rgba(255, 215, 0, 0.03) 25%, transparent 25%), 
                linear-gradient(-45deg, rgba(255, 215, 0, 0.03) 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, rgba(255, 215, 0, 0.03) 75%), 
                linear-gradient(-45deg, transparent 75%, rgba(255, 215, 0, 0.03) 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        .container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1200px; /* Leggermente più largo */
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--shadow-card);
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 215, 0, 0.1); /* Sottile bordo giallo */
        }

        /* Desktop Layout */
        @media (min-width: 900px) {
            .container {
                flex-direction: row;
                min-height: 70vh;
                align-items: stretch;
            }
        }

        /* ==========================================
           AREA IMMAGINE (CYBORG RIELABORATO)
           ========================================== */
        .image-area {
            position: relative;
            background: linear-gradient(to bottom, #0a0a0a, #000000);
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Allinea l'immagine in basso */
            padding: 0;
            flex: 1;
            min-height: 400px;
            overflow: hidden;
        }

        .image-area img {
            width: auto;
            height: 110%; /* Leggermente più alto del contenitore per effetto immersivo */
            max-width: none;
            object-fit: cover;
            
            /* FILTRI CYBERPUNK: Converte il verde in tonalità oro/giallo e aumenta il contrasto drammatico */
            filter: grayscale(100%) sepia(100%) hue-rotate(5deg) saturate(300%) contrast(1.3) brightness(0.9);
            
            /* Maschera per sfumare l'immagine nel nero della card */
            mask-image: linear-gradient(to bottom, black 50%, transparent 95%);
            -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 95%);
            
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.5s ease;
        }

        .image-area:hover img {
            transform: scale(1.03);
            /* Aumenta la luminosità e il bagliore all'hover */
            filter: grayscale(100%) sepia(100%) hue-rotate(5deg) saturate(350%) contrast(1.4) brightness(1.1) drop-shadow(0 0 15px rgba(255, 215, 0, 0.5));
        }

        @media (min-width: 900px) {
            .image-area {
                flex: 1.1;
                height: auto;
                align-items: center;
            }
            .image-area img {
                height: auto;
                width: 120%;
                /* Su desktop, sfuma verso destra verso il contenuto */
                mask-image: linear-gradient(to right, black 60%, transparent 100%);
                -webkit-mask-image: linear-gradient(to right, black 60%, transparent 100%);
                margin-left: -10%; /* Centra meglio l'azione */
            }
        }

        /* ==========================================
           AREA CONTENUTO E TESTI
           ========================================== */
        .content-area {
            flex: 1;
            padding: clamp(2rem, 5vw, 5rem);
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: transparent;
            z-index: 2; /* Assicura che il testo sia sopra l'eventuale sfumatura dell'immagine */
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .brand-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            /* Colori invertiti per il tema giallo */
            color: var(--bg-color);
            background-color: var(--accent-color);
            padding: 0.6rem 1.2rem;
            border-radius: 2px; /* Angoli più spigolosi per look tech */
            box-shadow: var(--glow-accent);
        }

        /* ==========================================
           SELETTORE LINGUE
           ========================================== */
        .language-selector {
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid rgba(255, 215, 0, 0.1);
        }

        .flag {
            width: 24px;
            height: auto;
            border-radius: 2px;
            cursor: pointer;
            opacity: 0.4;
            filter: grayscale(80%); /* Bandiere spente in un tema scuro */
            transition: all 0.3s ease;
        }

        .flag:hover, .flag.active {
            opacity: 1;
            filter: grayscale(0%); /* Colore pieno quando attive */
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); /* Bagliore giallo */
        }

        /* ==========================================
           TIPOGRAFIA
           ========================================== */
        h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            line-height: 1;
            margin-bottom: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            /* Gradiente testuale giallo/bianco */
            background: linear-gradient(to right, var(--text-main), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: clamp(1rem, 1.5vw, 1.125rem);
            line-height: 1.7;
            color: var(--text-muted);
            margin-bottom: 3rem;
            max-width: 90%;
        }

        /* ==========================================
           BOTTONE GIALLO CYBERPUNK
           ========================================== */
        .cta-button {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            background-color: var(--accent-color);
            color: var(--btn-text);
            text-decoration: none;
            padding: 1.2rem 3rem;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 4px; /* Angoli spigolosi */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            box-shadow: var(--glow-accent);
            position: relative;
            overflow: hidden;
        }

        /* Effetto riflesso sul bottone */
        .cta-button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0.4) 0%, transparent 50%, transparent 100%);
            transform: rotate(45deg);
            transition: all 0.5s ease;
            opacity: 0;
        }

        @media (min-width: 600px) {
            .cta-button {
                width: max-content;
            }
        }

        .cta-button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px -5px rgba(255, 215, 0, 0.6); /* Bagliore più intenso */
        }
        
        .cta-button:hover::after {
            opacity: 1;
            left: 0;
            top: 0;
        }

        .cta-button:active {
            transform: translateY(0) scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Area Immagine: Cyborg Rielaborato -->
        <div class="image-area">
            <!-- NOTA: Utilizzo l'immagine fornita 'cyborgcalciatore.jpeg' ma applico filtri CSS pesanti per trasformarla nel tema giallo/oro -->
            <img src="cyborgcalciatore.jpeg" alt="Betting Exchange Cyborg Striker">
        </div>

        <!-- Area Contenuto -->
        <div class="content-area">
            
            <div class="content-header">
                <div class="brand-badge" id="badge">Official Community Gear</div>
                
                <div class="language-selector">
                    <img src="https://flagcdn.com/w40/gb.png" alt="English" data-lang="en" class="flag" onclick="setLanguage('en')">
                    <img src="https://flagcdn.com/w40/es.png" alt="Español" data-lang="es" class="flag" onclick="setLanguage('es')">
                    <img src="https://flagcdn.com/w40/pt.png" alt="Português" data-lang="pt" class="flag" onclick="setLanguage('pt')">
                    <img src="https://flagcdn.com/w40/it.png" alt="Italiano" data-lang="it" class="flag" onclick="setLanguage('it')">
                </div>
            </div>

            <h1 id="title">Betting Exchange Room</h1>
            <p id="desc">Join the elite trading team. Wear our premium apparel to support the community and show your passion. Worldwide shipping available.</p>
            
            <!-- Bottone Acquista Giallo -->
            <a href="https://bettingexchangeroom-shop.fourthwall.com/" class="cta-button" id="btn" target="_blank" rel="noopener noreferrer">Shop the Collection</a>
            
        </div>
    </div>

    <!-- ==========================================
         SCRIPT: LINGUA (INVARIATO)
         ========================================== -->
    <script>
        // Dizionario traduzioni
        const translations = {
            en: {
                badge: "Official Community Gear",
                title: "Betting Exchange Room",
                desc: "Join the elite trading team. Wear our premium apparel to support the community and show your passion. Worldwide shipping available.",
                btn: "Shop the Collection"
            },
            es: {
                badge: "Mercancía Oficial",
                title: "Betting Exchange Room",
                desc: "Únete al equipo de trading de élite. Usa nuestra ropa premium para apoyar a la comunidad y mostrar tu pasión. Envío a nivel mundial.",
                btn: "Explorar Colección"
            },
            pt: {
                badge: "Equipamento Oficial",
                title: "Betting Exchange Room",
                desc: "Junte-se à equipe de elite do trading. Use nosso vestuário premium para apoiar a comunidade e mostrar sua paixão. Envio mundial disponível.",
                btn: "Explorar Coleção"
            },
            it: {
                badge: "Merchandising Ufficiale",
                title: "Betting Exchange Room",
                desc: "Unisciti al team di trading d'élite. Indossa il nostro abbigliamento premium per supportare la community e mostrare la tua passione. Spedizioni in tutto il mondo.",
                btn: "Esplora la Collezione"
            }
        };

        const supportedLangs = ['en', 'es', 'pt', 'it'];

        function initLanguage() {
            const userLang = (navigator.language || navigator.userLanguage).slice(0, 2).toLowerCase();
            const targetLang = supportedLangs.includes(userLang) ? userLang : 'en';
            setLanguage(targetLang);
        }

        function setLanguage(lang) {
            document.getElementById('badge').innerText = translations[lang].badge;
            document.getElementById('title').innerText = translations[lang].title;
            document.getElementById('desc').innerText = translations[lang].desc;
            document.getElementById('btn').innerText = translations[lang].btn;

            document.documentElement.lang = lang;

            document.querySelectorAll('.flag').forEach(flag => {
                flag.classList.remove('active');
            });
            const activeFlag = document.querySelector(`.flag[data-lang="${lang}"]`);
            if (activeFlag) {
                activeFlag.classList.add('active');
            }
        }

        document.addEventListener('DOMContentLoaded', initLanguage);
    </script>
</body>
</html>
