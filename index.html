                    <span className="text-zinc-400">{t('volume')}</span>
                    <span className={isQualified ? 'text-brand-400' : 'text-zinc-100'}>{formatCurrency(weeklyVolume, sc.state.isHidden)} / {weeklyTarget} USDT</span>
                  </div>
                  <div className="h-2 w-full bg-surface-950 rounded-full overflow-hidden shadow-inner">
                    <div className={`h-full rounded-full transition-all duration-1000 ${isQualified ? 'bg-brand-500' : 'bg-zinc-600'}`} style={{width: `${Math.min((weeklyVolume/weeklyTarget)*100, 100)}%`}}></div>
                  </div>
               </div>
               
               <p className={`text-xs font-black uppercase tracking-widest mt-2 ${isQualified ? 'text-brand-400' : 'text-zinc-500'}`}>
                 {isQualified ? t('pool_qualified') : t('pool_unqualified')}
               </p>
               <div className="mt-4 pt-4 border-t border-surface-800/50 w-full">
                 <p className="text-[10px] text-zinc-500 uppercase tracking-widest font-bold mb-1">{t('ends_sat')}</p>
                 <p className="text-lg font-mono font-black text-zinc-200">{formatCurrency(weeklyPoolTotal, sc.state.isHidden)} <span className="text-xs text-zinc-500">USDT</span></p>
               </div>
            </Card>

            <div className="lg:col-span-3 grid grid-cols-1 sm:grid-cols-2 gap-4">
               <StatCard title={t('lifetime_deposit')} value={`${formatCurrency(sc.state.promoterLifetime, sc.state.isHidden)}`} subtext="USDT" icon="coins" colorClass="text-brand-400" />
               <StatCard title={t('daily_subs')} value="345" subtext="Registered" icon="users" colorClass="text-blue-400" />
               <StatCard title={t('conv_rate')} value="18.5%" subtext="Lead to Active" icon="pie-chart" colorClass="text-brand-400" />
               <StatCard title={t('bot_interactions')} value="1,240" subtext="Total Clicks" icon="mouse-pointer-click" colorClass="text-cyan-400" />
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <Card className="flex flex-col items-center justify-center text-center relative overflow-hidden bg-gradient-to-b from-surface-900 to-surface-950 border-t-2 border-t-success-500" padding="p-8">
              <div className="w-16 h-16 bg-success-500/10 border border-success-500/30 text-success-400 rounded-full flex items-center justify-center mb-5 shadow-[0_0_20px_rgba(16,185,129,0.2)]"><Icon name="wallet" size={30} /></div>
              <p className="text-xs text-zinc-500 font-bold uppercase tracking-widest mb-2">{t('vault_available')}</p>
              <div className="text-4xl sm:text-5xl font-black text-zinc-100 mb-4 tracking-tight truncate w-full font-mono drop-shadow-md">{formatCurrency(sc.state.promoterAvailable, sc.state.isHidden)} {!sc.state.isHidden && <span className="text-xl text-success-400 ml-2 font-sans tracking-normal">USDT</span>}</div>
              <div className="mb-6">
                <button onClick={sc.toggleHidden} className="text-zinc-500 hover:text-zinc-300 transition-colors p-2.5 bg-surface-950 rounded-xl border border-surface-800 flex items-center gap-2 text-xs font-bold uppercase mx-auto"><Icon name={sc.state.isHidden ? 'eye' : 'eye-off'} size={16} /> {sc.state.isHidden ? t('show_balances') : t('hide_balances')}</button>
              </div>

              <div className="w-full max-w-xs mt-auto">
                {!sc.state.tonWallet ? (
                  <button onClick={() => setShowWalletModal(true)} className="w-full py-4 rounded-xl font-black text-sm uppercase tracking-widest flex items-center justify-center gap-2 transition-transform hover:-translate-y-0.5 bg-gold-gradient text-surface-950 hover:opacity-90 shadow-[0_10px_20px_rgba(212,175,55,0.2)]"><Icon name="wallet" size={20} /> {t('setup_wallet')}</button>
                ) : (
                  <div className="flex flex-col gap-3">
                    <button onClick={() => setShowWalletModal(true)} className="flex items-center justify-center gap-2 text-xs font-mono text-zinc-400 bg-surface-900 border border-surface-800 hover:border-brand-500/50 py-2.5 rounded-lg transition-colors group">
                      <span className="truncate max-w-[150px]">{sc.state.tonWallet}</span>
                      <Icon name="pencil" size={12} className="group-hover:text-brand-400" />
                    </button>
                    <button onClick={() => { if(sc.state.promoterAvailable > 0) setShowSecureModal(true); }} disabled={isClaiming || sc.state.promoterAvailable <= 0} className={`w-full py-4 rounded-xl font-black text-sm uppercase tracking-widest flex items-center justify-center gap-2 transition-all ${sc.state.promoterAvailable <= 0 ? 'bg-surface-950 border border-surface-800 text-zinc-600' : isClaiming ? 'bg-success-600 text-white cursor-wait' : 'bg-success-600 hover:bg-success-500 text-white shadow-[0_10px_20px_rgba(16,185,129,0.3)] hover:-translate-y-0.5'}`}>
                      {sc.state.promoterAvailable <= 0 ? (<><Icon name="lock" size={20} /> {t('no_funds')}</>) : isClaiming ? (<><Icon name="loader-2" size={20} className="animate-spin" /> {t('signing')}</>) : (<><Icon name="fingerprint" size={22} /> {t('unlock_withdraw')}</>)}
                    </button>
                  </div>
                )}
              </div>
            </Card>

            <Card className="lg:col-span-2 flex flex-col">
              <h3 className="text-sm font-bold text-zinc-100 mb-6 uppercase tracking-widest flex items-center gap-2"><Icon name="bar-chart-3" size={18} className="text-success-500" /> {t('earnings_chart')}</h3>
              <div className="flex-1 w-full min-h-[220px]">
                <ResponsiveContainer width="100%" height="100%">
                  <AreaChart data={localizedChartData} margin={{top: 5, right: 0, left: -20, bottom: 0}}>
                    <defs><linearGradient id="colorPromoterAmount" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#10b981" stopOpacity={0.4}/><stop offset="95%" stopColor="#10b981" stopOpacity={0}/></linearGradient></defs>
                    <CartesianGrid strokeDasharray="3 3" stroke="#27272a" vertical={false} />
                    <XAxis dataKey="name" stroke="#71717a" tick={{fill: '#71717a', fontSize: 11, fontWeight: 700, textTransform:'uppercase'}} axisLine={false} tickLine={false} dy={10} />
                    <YAxis stroke="#71717a" tick={{fill: '#71717a', fontSize: 11, fontWeight: 700}} axisLine={false} tickLine={false} dx={-10} width={60} />
                    <Tooltip contentStyle={{ backgroundColor: '#18181b', border: '1px solid #3f3f46', borderRadius: '12px', color: '#fff', boxShadow: '0 10px 25px rgba(0,0,0,0.5)' }} itemStyle={{ color: '#34d399', fontWeight: 'bold' }} />
                    <Area type="monotone" dataKey="amount" stroke="#10b981" strokeWidth={3} fillOpacity={1} fill="url(#colorPromoterAmount)" activeDot={{r: 6, fill: '#10b981', stroke: '#fff', strokeWidth: 3}} />
                  </AreaChart>
                </ResponsiveContainer>
              </div>
            </Card>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <Card padding="p-0" className="flex flex-col flex-grow min-h-[400px]">
              <div className="p-5 border-b border-surface-800 bg-surface-900/50 flex justify-between items-center shrink-0">
                <h3 className="text-zinc-100 font-bold uppercase tracking-widest text-sm flex items-center gap-2"><Icon name="network" size={18} className="text-brand-500" /> {t('my_network')}</h3>
              </div>
              <div className="overflow-x-auto w-full max-h-[400px] overflow-y-auto custom-scrollbar relative">
                <table className="w-full text-left border-collapse">
                  <thead className="sticky top-0 z-10 bg-surface-900 shadow-md">
                    <tr className="text-[10px] uppercase tracking-wider text-zinc-500 border-b border-surface-800">
                      <th className="px-5 py-3 font-bold">User</th>
                      <th className="px-5 py-3 font-bold">Action</th>
                      <th className="px-5 py-3 font-bold text-right">Volume</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-surface-800/50 bg-surface-950/30">
                    {PROMOTER_NETWORK_DATA.map((lead, idx) => (
                      <tr key={idx} className="hover:bg-surface-900/50 transition-colors">
                        <td className="px-5 py-3">
                          <div className="flex items-center gap-3">
                             <div className={`p-2 rounded-lg shrink-0 border ${lead.type === 'deposit' ? 'bg-success-500/10 text-success-400 border-success-500/30' : 'bg-brand-500/10 text-brand-400 border-brand-500/30'}`}><Icon name={lead.type === 'deposit' ? 'coins' : 'user-plus'} size={14} /></div>
                             <div>
                               <TgLink username={lead.username} className="text-xs" />
                               <p className="text-[9px] text-zinc-500 uppercase tracking-wider font-bold mt-0.5">{lead.time}</p>
                             </div>
                          </div>
                        </td>
                        <td className="px-5 py-3 text-xs text-zinc-400">
                          <span className={`inline-flex items-center px-1.5 py-0.5 rounded text-[9px] font-black uppercase tracking-wider border ${lead.status === 'Active' ? 'bg-success-500/10 text-success-400 border-success-500/20' : 'bg-surface-800 text-zinc-500 border-surface-700'}`}>
                            {lead.status}
                          </span>
                        </td>
                        <td className="px-5 py-3 text-right">
                          <span className={`font-mono text-xs font-bold ${lead.total_vol > 0 ? 'text-brand-400' : 'text-zinc-500'}`}>
                            {lead.total_vol > 0 ? `${lead.total_vol} USDT` : '-'}
                          </span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </Card>
            
            <Card padding="p-0" className="flex flex-col flex-grow min-h-[400px]">
              <div className="p-5 border-b border-surface-800 bg-surface-900/50 flex justify-between items-center shrink-0">
                <h3 className="text-zinc-100 font-bold uppercase tracking-widest text-sm flex items-center gap-2"><Icon name="history" size={18} className="text-zinc-500" /> {t('audit_trail')}</h3>
              </div>
              <div className="flex-1 p-5 overflow-y-auto custom-scrollbar max-h-[400px]">
                {sc.state.claimHistory.length === 0 ? (
                  <div className="h-full min-h-[200px] flex flex-col items-center justify-center text-zinc-600"><Icon name="history" size={36} className="mb-4 opacity-50" /><p className="text-sm font-bold uppercase tracking-widest">{t('no_tx')}</p></div>
                ) : (
                  <div className="space-y-3">
                    {sc.state.claimHistory.map((item, idx) => (
                      <div key={idx} className="flex justify-between items-center bg-surface-950 p-4 rounded-xl border border-surface-800 hover:border-surface-700 transition-colors">
                        <div>
                          <p className="text-zinc-200 text-sm font-bold">{item.date}</p>
                          <p className="text-[10px] text-zinc-500 mt-1.5 font-mono uppercase tracking-widest flex items-center gap-1"><Icon name="check-circle-2" size={14} className="text-success-500"/> {item.tx}</p>
                        </div>
                        <span className="text-success-400 font-black text-sm font-mono bg-success-500/10 px-2.5 py-1.5 rounded border border-success-500/20">+{formatCurrency(item.amount, sc.state.isHidden)}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </Card>
          </div>
          
          <SecurityModal isOpen={showSecureModal} onClose={() => setShowSecureModal(false)} onConfirm={async () => { setShowSecureModal(false); setIsClaiming(true); await sc.processClaim(); setIsClaiming(false); }} amount={sc.state.promoterAvailable} walletAddress={sc.state.tonWallet || sc.state.walletAddress} t={t} />
          <TonWalletModal isOpen={showWalletModal} onClose={() => setShowWalletModal(false)} onSave={(val) => { sc.setTonWallet(val); sc.addToast('Success', t('save_wallet'), 'success'); }} currentWallet={sc.state.tonWallet} t={t} />
        </div>
      );
    };

    const useSmartContract = () => {
      const [walletConnected, setWalletConnected] = useState(false);
      const [walletAddress, setWalletAddress] = useState(null);
      const [tonWallet, setTonWalletState] = useState('');
      const [isHidden, setIsHidden] = useState(false);
      const [toasts, setToasts] = useState([]);
      
      const [contractBalance, setContractBalance] = useState(3200.50);
      const [totalProcessed, setTotalProcessed] = useState(12450.00);
      const [activePromoters, setActivePromoters] = useState(142);
      
      const [promoterAvailable, setPromoterAvailable] = useState(450.00);
      const [promoterLifetime, setPromoterLifetime] = useState(3250.00);
      const [promoterWeeklyVolume, setPromoterWeeklyVolume] = useState(550.00); 
      const [claimHistory, setClaimHistory] = useState([ { date: '12 May 2026', amount: 120.00, tx: '0xTX...4f2' } ]);

      const addToast = useCallback((title, message, type = 'info') => {
        const id = Date.now() + Math.random(); setToasts(prev => [...prev, { id, title, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000); 
      }, []);

      const connect = (role) => {
        setWalletConnected(true);
        setWalletAddress(role === 'company' ? "0xCORP_ADMIN...77Xz" : "0xPARTNER...99Xz");
        setIsHidden(false);
      };

      const disconnect = () => {
        setWalletConnected(false);
        setWalletAddress(null);
        setIsHidden(false);
      };

      const simulateDeposit = () => {
        return new Promise(resolve => {
          setTimeout(() => {
            setTotalProcessed(p => p + 150);
            setContractBalance(p => p + 45);
            addToast("Deposit Detected", "Liquidity updated on-chain.", "info");
            resolve();
          }, 1000);
        });
      };

      const processClaim = () => {
        return new Promise(resolve => {
          setTimeout(() => {
            const amount = promoterAvailable;
            setPromoterAvailable(0);
            setPromoterLifetime(p => p + amount);
            setClaimHistory([{ date: new Date().toLocaleDateString('en-GB'), amount, tx: '0xTX...NEW' }, ...claimHistory]);
            addToast("Transfer Auth Success", "Funds sent to your wallet.", "success");
            resolve();
          }, 1500);
        });
      };

      return {
        state: { walletConnected, walletAddress, tonWallet, isHidden, toasts, contractBalance, totalProcessed, activePromoters, promoterAvailable, promoterLifetime, promoterWeeklyVolume, claimHistory },
        connect, disconnect, addToast, simulateDeposit, processClaim, toggleHidden: () => setIsHidden(!isHidden), setTonWallet: setTonWalletState
      };
    };

    const App = () => {
      const [lang, setLang] = useState('en');
      const [view, setView] = useState('user');
      const [isInitLoad, setIsInitLoad] = useState(true);
      const sc = useSmartContract(); 

      useEffect(() => {
        const browserLang = (navigator.language || navigator.userLanguage).split('-')[0].toLowerCase();
        if (['en', 'es', 'pt', 'it'].includes(browserLang)) { setLang(browserLang); }
        setTimeout(() => setIsInitLoad(false), 800);
      }, []);

      const t = useCallback((key) => translations[lang]?.[key] || translations['en'][key] || key, [lang]);

      const handleWalletToggle = () => {
        if (sc.state.walletConnected) {
          sc.disconnect();
          sc.addToast(t('logout'), "", "info");
        } else {
          sc.connect(view);
          sc.addToast('Connected', t('connected_desc'), "success");
        }
      };

      if (isInitLoad) return <div className="initial-loader"><div className="spinner-ring"></div><div className="text-xs text-zinc-500 mt-2 font-bold tracking-widest uppercase">Initializing Elite Environment...</div></div>;

      return (
        <div className="bg-grid-pattern min-h-screen flex flex-col">
          <ToastContainer toasts={sc.state.toasts} />
          
          <nav className="glass-panel border-b border-surface-800 sticky top-0 z-40 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 h-16 sm:h-20 flex items-center justify-between gap-4">
              <div className="flex items-center gap-3 sm:gap-4">
                <div className="relative w-10 h-10 sm:w-12 sm:h-12 rounded-full overflow-hidden shrink-0 border border-brand-500/50 shadow-[0_0_15px_rgba(212,175,55,0.2)] p-0.5 bg-surface-950">
                   <img src="logo-tondo.jpeg" alt="Logo" className="w-full h-full object-cover rounded-full" onError={(e)=>{e.target.src='https://ui-avatars.com/api/?name=ER&background=18181b&color=d4af37'}} />
                </div>
                <div className="flex flex-col justify-center">
                  <h1 className="text-[11px] sm:text-base font-black tracking-widest text-zinc-100 leading-none uppercase">{t('app_title')}</h1>
                  <span className="text-[9px] sm:text-[10px] text-brand-500 font-bold tracking-widest uppercase mt-1">{t('affiliate_program')}</span>
                </div>
              </div>

              <div className="flex items-center gap-3 sm:gap-4 shrink-0">
                <LanguageSelector lang={lang} setLang={setLang} />

                {sc.state.walletConnected && (
                  <div className="hidden md:flex items-center bg-surface-950/80 border border-surface-800 rounded-lg p-1 shadow-inner">
                    <button onClick={() => setView('user')} className={`px-4 py-2 text-xs font-bold uppercase tracking-wider rounded-md transition-all ${view === 'user' ? 'bg-surface-800 text-brand-400 shadow-sm' : 'text-zinc-500 hover:text-zinc-300'}`}>{t('user_dash')}</button>
                    <button onClick={() => setView('promoter')} className={`px-4 py-2 text-xs font-bold uppercase tracking-wider rounded-md transition-all ${view === 'promoter' ? 'bg-surface-800 text-brand-400 shadow-sm' : 'text-zinc-500 hover:text-zinc-300'}`}>{t('partner_dash')}</button>
                    <button onClick={() => setView('company')} className={`px-4 py-2 text-xs font-bold uppercase tracking-wider rounded-md transition-all ${view === 'company' ? 'bg-surface-800 text-brand-400 shadow-sm' : 'text-zinc-500 hover:text-zinc-300'}`}>{t('company_dash')}</button>
                  </div>
                )}

                <button onClick={handleWalletToggle} className={`flex items-center gap-2 px-5 py-2.5 sm:py-3 rounded-xl font-black text-xs sm:text-sm uppercase tracking-wider transition-all shadow-lg ${sc.state.walletConnected ? 'bg-surface-900 border border-surface-700 text-zinc-300 hover:bg-surface-800 hover:text-white' : 'bg-gold-gradient text-surface-950 hover:opacity-90 hover:-translate-y-0.5 shadow-[0_5px_20px_rgba(212,175,55,0.2)]'}`}>
                  {sc.state.walletConnected ? (<><Icon name="log-out" size={18} className="text-zinc-500 shrink-0"/><span className="hidden sm:inline">{t('logout')}</span></>) : (<><Icon name="log-in" size={18} className="shrink-0"/> <span>{t('login')}</span></>)}
                </button>
              </div>
            </div>
          </nav>

          <main className={`max-w-7xl mx-auto px-4 sm:px-6 py-8 flex-1 w-full relative z-10 ${sc.state.walletConnected ? 'pb-24 md:pb-8' : ''}`}>
            {!sc.state.walletConnected ? (
              <div className="flex flex-col items-center justify-center min-h-[60vh] text-center space-y-6 fade-in">
                <div className="w-28 h-28 bg-surface-900 text-brand-400 rounded-[2rem] flex items-center justify-center border border-brand-500/50 mb-4 shadow-[0_0_40px_rgba(212,175,55,0.2)] relative">
                  <div className="absolute inset-0 bg-brand-500/10 rounded-[2rem] animate-pulse"></div>
                  <Icon name="shield-check" size={48} className="relative z-10" />
                </div>
                <div className="max-w-lg">
                  <h2 className="text-3xl font-black text-zinc-100 uppercase tracking-wide">Elite Platform</h2>
                </div>
                <button onClick={handleWalletToggle} className="px-10 py-4 bg-gold-gradient text-surface-950 rounded-xl font-black text-sm uppercase tracking-widest shadow-[0_10px_30px_rgba(212,175,55,0.3)] transition-transform hover:-translate-y-1 flex items-center gap-3 mt-4">
                   {t('login')} <Icon name="arrow-right" size={20} />
                </button>
              </div>
            ) : (
              view === 'user' ? <UserDashboard t={t} /> :
              view === 'company' ? <CompanyDashboard sc={sc} t={t} /> : 
              <PromoterDashboard sc={sc} t={t} lang={lang} />
            )}
            
            {sc.state.walletConnected && (
              <div className="md:hidden fixed bottom-6 left-4 right-4 bg-surface-950/95 backdrop-blur-xl border border-surface-800 rounded-xl p-1.5 flex shadow-[0_10px_40px_rgba(0,0,0,0.8)] z-40 gap-1.5">
                <button onClick={() => setView('user')} className={`flex-1 py-3.5 rounded-lg text-[10px] sm:text-xs font-bold uppercase tracking-wider transition-all ${view === 'user' ? 'bg-surface-800 text-brand-400 shadow-sm' : 'text-zinc-500'}`}>{t('user_dash')}</button>
                <button onClick={() => setView('promoter')} className={`flex-1 py-3.5 rounded-lg text-[10px] sm:text-xs font-bold uppercase tracking-wider transition-all ${view === 'promoter' ? 'bg-surface-800 text-brand-400 shadow-sm' : 'text-zinc-500'}`}>{t('partner_dash')}</button>
                <button onClick={() => setView('company')} className={`flex-1 py-3.5 rounded-lg text-[10px] sm:text-xs font-bold uppercase tracking-wider transition-all ${view === 'company' ? 'bg-surface-800 text-brand-400 shadow-sm' : 'text-zinc-500'}`}>{t('company_dash')}</button>
              </div>
            )}
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
