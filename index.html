    .spinner-ring {

    @keyframes spin { to { transform: rotate(360deg); } }

                </div>
              </Card>

              <Card className={`relative overflow-hidden flex flex-col items-center justify-center text-center p-4 border-b-4 shrink-0 flex-1 min-h-[200px] ${isQualified ? 'border-brand-500 bg-gradient-to-t from-brand-500/10 to-surface-900' : 'border-surface-700'}`}>
                 <h3 className="text-[10px] sm:text-[11px] font-bold uppercase tracking-widest mb-3 flex items-center gap-1.5 text-zinc-300"><Icon name="award" size={14} className={isQualified ? 'text-brand-500' : 'text-zinc-500'}/> {t('weekly_pool')}</h3>
                 <div className="relative mb-3 sm:mb-4">
                   {isQualified && <div className="absolute inset-0 bg-brand-500/30 blur-[30px] rounded-full"></div>}
                   <div className={`w-16 h-16 sm:w-20 sm:h-20 lg:w-24 lg:h-24 rounded-full border-[3px] flex items-center justify-center overflow-hidden relative z-10 ${isQualified ? 'border-brand-400 coin-glow coin-qualified' : 'border-zinc-600 coin-unqualified'}`}>
                      {isQualified && <div className="absolute inset-0 bg-gradient-to-br from-brand-300/30 to-brand-700/30 mix-blend-overlay coin-spin z-20 pointer-events-none"></div>}
                      <img src="logo-tondo.jpeg" alt="Coin" loading="lazy" className="w-full h-full object-cover" onError={(e)=>{e.target.src='https://ui-avatars.com/api/?name=ER&background=000&color=d4af37'}} />
                   </div>
                 </div>
                 <div className="w-full mb-2 max-w-[200px]">
                    <div className="flex justify-between text-[8px] sm:text-[9px] font-black uppercase tracking-wider mb-1">
                      <span className="text-zinc-400">{t('volume')}</span>
                      <span className={isQualified ? 'text-brand-400' : 'text-zinc-100'}>{formatCurrency(weeklyVolume, sc.state.isHidden)} / {weeklyTarget}</span>
                    </div>
                    <div className="h-1.5 w-full bg-surface-950 rounded-full overflow-hidden shadow-inner">
                      <div className={`h-full rounded-full transition-all duration-1000 ${isQualified ? 'bg-brand-500' : 'bg-zinc-600'}`} style={{width: `${Math.min((weeklyVolume/weeklyTarget)*100, 100)}%`}}></div>
                    </div>
                 </div>
                 <p className={`text-[9px] sm:text-[10px] font-black uppercase tracking-widest mt-1 ${isQualified ? 'text-brand-400' : 'text-zinc-500'}`}>{isQualified ? t('pool_qualified') : t('pool_unqualified')}</p>
                 <div className="mt-auto pt-2 sm:pt-3 border-t border-surface-800/50 w-full">
                   <p className="text-base sm:text-lg font-mono font-black text-zinc-200 leading-none">{formatCurrency(weeklyPoolTotal, sc.state.isHidden)} <span className="text-[9px] sm:text-[10px] text-zinc-500">USDT</span></p>
                 </div>
              </Card>
            </div>

            {/* Middle Column: Chart & Stats Grid */}
            <div className="lg:col-span-5 xl:col-span-5 flex flex-col gap-4 lg:gap-5 min-h-0">
              <Card className="flex flex-col flex-col-fluid flex-1 min-h-[220px] lg:min-h-0" padding="p-4 sm:p-5">
                <h3 className="text-xs font-bold text-zinc-100 mb-4 uppercase tracking-widest flex items-center gap-2 shrink-0"><Icon name="bar-chart-3" size={16} className="text-success-500" /> {t('earnings_chart')}</h3>
                <div className="flex-1 w-full min-h-0">
                  <ResponsiveContainer width="100%" height="100%">
                    <AreaChart data={localizedChartData} margin={{top: 5, right: 0, left: -20, bottom: 0}}>
                      <defs><linearGradient id="colorPromoterAmount" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#10b981" stopOpacity={0.4}/><stop offset="95%" stopColor="#10b981" stopOpacity={0}/></linearGradient></defs>
                      <CartesianGrid strokeDasharray="3 3" stroke="#27272a" vertical={false} />
                      <XAxis dataKey="name" stroke="#71717a" tick={{fill: '#71717a', fontSize: 10, fontWeight: 700, textTransform:'uppercase'}} axisLine={false} tickLine={false} dy={10} />
                      <YAxis stroke="#71717a" tick={{fill: '#71717a', fontSize: 10, fontWeight: 700}} axisLine={false} tickLine={false} dx={-10} width={50} />
                      <Tooltip contentStyle={{ backgroundColor: '#18181b', border: '1px solid #3f3f46', borderRadius: '12px', color: '#fff' }} itemStyle={{ color: '#34d399', fontWeight: 'bold' }} />
                      <Area type="monotone" dataKey="amount" stroke="#10b981" strokeWidth={2} fillOpacity={1} fill="url(#colorPromoterAmount)" activeDot={{r: 5, fill: '#10b981', stroke: '#fff', strokeWidth: 2}} />
                    </AreaChart>
                  </ResponsiveContainer>
                </div>
              </Card>

              <div className="grid grid-cols-2 gap-2 sm:gap-3 lg:gap-4 shrink-0">
                <StatCard title={t('lifetime_deposit')} value={formatCurrency(sc.state.promoterLifetime, sc.state.isHidden)} subtext="USDT" icon="coins" colorClass="text-brand-400" />
                <StatCard title={t('daily_subs')} value="345" subtext={t('registered_subtext')} icon="users" colorClass="text-blue-400" />
                <StatCard title={t('conv_rate')} value="18.5%" subtext={t('conv_subtext')} icon="pie-chart" colorClass="text-brand-400" />
                <StatCard title={t('bot_interactions')} value="1,240" subtext={t('clicks_subtext')} icon="mouse-pointer-click" colorClass="text-cyan-400" />
              </div>
            </div>

            {/* Right Column: Network List & Audit Trail */}
            <div className="lg:col-span-4 xl:col-span-4 flex flex-col gap-4 lg:gap-5 min-h-0">
              <Card padding="p-0" className="flex flex-col flex-col-fluid flex-1 min-h-[300px] lg:min-h-0">
                <div className="p-3 sm:p-4 border-b border-surface-800 bg-surface-900/50 flex justify-between items-center shrink-0">
                  <h3 className="text-zinc-100 font-bold uppercase tracking-widest text-xs flex items-center gap-2"><Icon name="network" size={16} className="text-brand-500" /> {t('my_network')}</h3>
                </div>
                <div className="flex-1 w-full overflow-y-auto custom-scrollbar relative min-h-0">
                  <table className="w-full text-left border-collapse">
                    <thead className="sticky top-0 z-10 bg-surface-900 shadow-md">
                      <tr className="text-[9px] uppercase tracking-wider text-zinc-500 border-b border-surface-800">
                        <th className="px-3 py-2.5 font-bold">{t('user_col')}</th>
                        <th className="px-3 py-2.5 font-bold">{t('action_col')}</th>
                        <th className="px-3 py-2.5 font-bold text-right">{t('vol_col')}</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-surface-800/50 bg-surface-950/30">
                      {PROMOTER_NETWORK_DATA.map((lead, idx) => (
                        <tr key={idx} className="hover:bg-surface-900/50 transition-colors">
                          <td className="px-3 py-2">
                            <div className="flex items-center gap-2">
                               <div className={`p-1.5 rounded-lg shrink-0 border hidden sm:block ${lead.type === 'deposit' ? 'bg-success-500/10 text-success-400 border-success-500/30' : 'bg-brand-500/10 text-brand-400 border-brand-500/30'}`}><Icon name={lead.type === 'deposit' ? 'coins' : 'user-plus'} size={12} /></div>
                               <div className="min-w-0">
                                 <TgLink username={lead.username} className="text-[10px] sm:text-[11px] truncate" />
                                 <p className="text-[8px] text-zinc-500 uppercase tracking-wider font-bold mt-0.5">{lead.time}</p>
                               </div>
                            </div>
                          </td>
                          <td className="px-3 py-2 text-xs text-zinc-400">
                            <span className={`inline-flex items-center px-1.5 py-0.5 rounded text-[8px] font-black uppercase tracking-wider border ${lead.status === 'Active' ? 'bg-success-500/10 text-success-400 border-success-500/20' : 'bg-surface-800 text-zinc-500 border-surface-700'}`}>
                              {lead.status}
                            </span>
                          </td>
                          <td className="px-3 py-2 text-right">
                            <span className={`font-mono text-[9px] sm:text-[10px] font-bold ${lead.total_vol > 0 ? 'text-brand-400' : 'text-zinc-500'} whitespace-nowrap`}>
                              {lead.total_vol > 0 ? `${lead.total_vol} USDT` : '-'}
                            </span>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </Card>
              
              <Card padding="p-0" className="flex flex-col flex-col-fluid flex-1 min-h-[180px] lg:min-h-0 shrink-0">
                <div className="p-3 sm:p-4 border-b border-surface-800 bg-surface-900/50 flex justify-between items-center shrink-0">
                  <h3 className="text-zinc-100 font-bold uppercase tracking-widest text-xs flex items-center gap-2"><Icon name="history" size={16} className="text-zinc-500" /> {t('audit_trail')}</h3>
                </div>
                <div className="flex-1 p-3 sm:p-4 overflow-y-auto custom-scrollbar min-h-0">
                  {sc.state.claimHistory.length === 0 ? (
                    <div className="h-full flex flex-col items-center justify-center text-zinc-600"><Icon name="history" size={24} className="mb-2 opacity-50" /><p className="text-[10px] font-bold uppercase tracking-widest">{t('no_tx')}</p></div>
                  ) : (
                    <div className="space-y-2">
                      {sc.state.claimHistory.map((item, idx) => (
                        <div key={idx} className="flex justify-between items-center bg-surface-950 p-2 sm:p-3 rounded-xl border border-surface-800 hover:border-surface-700 transition-colors">
                          <div>
                            <p className="text-zinc-200 text-[10px] sm:text-xs font-bold">{item.date}</p>
                            <p className="text-[8px] sm:text-[9px] text-zinc-500 mt-1 font-mono uppercase tracking-widest flex items-center gap-1"><Icon name="check-circle-2" size={10} className="text-success-500"/> {item.tx}</p>
                          </div>
                          <span className="text-success-400 font-black text-[10px] sm:text-xs font-mono bg-success-500/10 px-2 py-1 rounded border border-success-500/20">+{formatCurrency(item.amount, sc.state.isHidden)}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </Card>
            </div>
            
          </div>
          
          <SecurityModal isOpen={showSecureModal} onClose={() => setShowSecureModal(false)} onConfirm={async () => { setShowSecureModal(false); setIsClaiming(true); await sc.processClaim(t); setIsClaiming(false); }} amount={sc.state.promoterAvailable} walletAddress={sc.state.tonWallet || sc.state.walletAddress} t={t} />
          <TonWalletModal isOpen={showWalletModal} onClose={() => setShowWalletModal(false)} onSave={(val) => { sc.setTonWallet(val); sc.addToast(t('toast_success_title'), t('save_wallet'), 'success'); }} currentWallet={sc.state.tonWallet} t={t} />
        </div>
      );
    };

    const useSmartContract = () => {
      const [walletConnected, setWalletConnected] = useState(false);
      const [walletAddress, setWalletAddress] = useState(null);
      const [tonWallet, setTonWalletState] = useState('');
      const [isHidden, setIsHidden] = useState(false);
      const [toasts, setToasts] = useState([]);
      
      const [contractBalance, setContractBalance] = useState(3200.50);
      const [totalProcessed, setTotalProcessed] = useState(12450.00);
      const [activePromoters, setActivePromoters] = useState(142);
      
      const [promoterAvailable, setPromoterAvailable] = useState(450.00);
      const [promoterLifetime, setPromoterLifetime] = useState(3250.00);
      const [promoterWeeklyVolume, setPromoterWeeklyVolume] = useState(550.00); 
      const [claimHistory, setClaimHistory] = useState([ { date: '12 May 2026', amount: 120.00, tx: '0xTX...4f2' } ]);

      const addToast = useCallback((title, message, type = 'info') => {
        const id = Date.now() + Math.random(); setToasts(prev => [...prev, { id, title, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000); 
      }, []);

      const connect = (role) => {
        setWalletConnected(true);
        setWalletAddress(role === 'company' ? "0xCORP_ADMIN...77Xz" : "0xPARTNER...99Xz");
        setIsHidden(false);
      };

      const disconnect = () => {
        setWalletConnected(false);
        setWalletAddress(null);
        setIsHidden(false);
      };

      const simulateDeposit = (t) => {
        return new Promise(resolve => {
          setTimeout(() => {
            setTotalProcessed(p => p + 150);
            setContractBalance(p => p + 45);
            addToast(t ? t('toast_dep_title') : "Deposit Detected", t ? t('toast_dep_msg') : "Liquidity updated on-chain.", "info");
            resolve();
          }, 1000);
        });
      };

      const processClaim = (t) => {
        return new Promise(resolve => {
          setTimeout(() => {
            const amount = promoterAvailable;
            setPromoterAvailable(0);
            setPromoterLifetime(p => p + amount);
            setClaimHistory([{ date: new Date().toLocaleDateString('en-GB'), amount, tx: '0xTX...NEW' }, ...claimHistory]);
            addToast(t ? t('toast_auth_title') : "Transfer Auth Success", t ? t('toast_auth_msg') : "Funds sent to your wallet.", "success");
            resolve();
          }, 1500);
        });
      };

      return {
        state: { walletConnected, walletAddress, tonWallet, isHidden, toasts, contractBalance, totalProcessed, activePromoters, promoterAvailable, promoterLifetime, promoterWeeklyVolume, claimHistory },
        connect, disconnect, addToast, simulateDeposit, processClaim, toggleHidden: () => setIsHidden(!isHidden), setTonWallet: setTonWalletState
      };
    };

    const App = () => {
      // Inizializza lingua in base al browser o fallback a 'en'
      const [lang, setLang] = useState(() => {
        const browserLang = (navigator.language || navigator.userLanguage).split('-')[0].toLowerCase();
        return ['en', 'es', 'pt', 'it'].includes(browserLang) ? browserLang : 'en';
      });
      const [view, setView] = useState('user');
      const [isInitLoad, setIsInitLoad] = useState(true);
      const sc = useSmartContract(); 

      useEffect(() => {
        setTimeout(() => setIsInitLoad(false), 800); // UI init simulator
      }, []);

      const t = useCallback((key) => translations[lang]?.[key] || translations['en'][key] || key, [lang]);

      const handleWalletToggle = () => {
        if (sc.state.walletConnected) {
          sc.disconnect();
          sc.addToast(t('logout'), "", "info");
        } else {
          sc.connect(view);
          sc.addToast(t('toast_conn_title'), t('toast_conn_msg'), "success");
        }
      };

      if (isInitLoad) return <div className="initial-loader"><div className="spinner-ring"></div><div className="text-xs text-zinc-500 mt-2 font-bold tracking-widest uppercase">Initializing Elite Environment...</div></div>;

      return (
        <div className="bg-grid-pattern h-full flex flex-col">
          <ToastContainer toasts={sc.state.toasts} />
          
          <nav className="glass-panel border-b border-surface-800 sticky top-0 z-40 shadow-sm shrink-0">
            <div className="max-w-[1400px] mx-auto px-4 sm:px-6 h-14 sm:h-16 flex items-center justify-between gap-2 sm:gap-4">
              <div className="flex items-center gap-2 sm:gap-3 flex-1 min-w-0">
                <div className="relative w-8 h-8 sm:w-10 sm:h-10 rounded-full overflow-hidden shrink-0 border border-brand-500/50 shadow-[0_0_15px_rgba(212,175,55,0.2)] p-0.5 bg-surface-950">
                   <img src="logo-tondo.jpeg" alt="Logo" loading="lazy" className="w-full h-full object-cover rounded-full" onError={(e)=>{e.target.src='https://ui-avatars.com/api/?name=ER&background=18181b&color=d4af37'}} />
                </div>
                <div className="flex flex-col justify-center min-w-0">
                  <h1 className="text-[10px] sm:text-[13px] font-black tracking-widest text-zinc-100 leading-tight uppercase truncate">{t('app_title')}</h1>
                </div>
              </div>

              <div className="flex items-center gap-2 sm:gap-4 shrink-0">
                <LanguageSelector lang={lang} setLang={setLang} />

                {sc.state.walletConnected && (
                  <div className="hidden md:flex items-center bg-surface-950/80 border border-surface-800 rounded-lg p-1 shadow-inner">
                    <button onClick={() => setView('user')} className={`px-3 py-1.5 text-[10px] font-bold uppercase tracking-wider rounded-md transition-all ${view === 'user' ? 'bg-surface-800 text-brand-400 shadow-sm' : 'text-zinc-500 hover:text-zinc-300'}`}>{t('user_dash')}</button>
                    <button onClick={() => setView('promoter')} className={`px-3 py-1.5 text-[10px] font-bold uppercase tracking-wider rounded-md transition-all ${view === 'promoter' ? 'bg-surface-800 text-brand-400 shadow-sm' : 'text-zinc-500 hover:text-zinc-300'}`}>{t('partner_dash')}</button>
                    <button onClick={() => setView('company')} className={`px-3 py-1.5 text-[10px] font-bold uppercase tracking-wider rounded-md transition-all ${view === 'company' ? 'bg-surface-800 text-brand-400 shadow-sm' : 'text-zinc-500 hover:text-zinc-300'}`}>{t('company_dash')}</button>
                  </div>
                )}

                <button onClick={handleWalletToggle} className={`flex items-center gap-1.5 px-3 sm:px-4 py-1.5 sm:py-2.5 rounded-lg font-black text-[10px] sm:text-xs uppercase tracking-wider transition-all shadow-lg ${sc.state.walletConnected ? 'bg-surface-900 border border-surface-700 text-zinc-300 hover:bg-surface-800 hover:text-white' : 'bg-gold-gradient text-surface-950 hover:opacity-90 hover:-translate-y-0.5 shadow-[0_5px_20px_rgba(212,175,55,0.2)]'}`}>
                  {sc.state.walletConnected ? (<><Icon name="log-out" size={14} className="text-zinc-500 shrink-0"/><span className="hidden sm:inline">{t('logout')}</span></>) : (<><Icon name="log-in" size={14} className="shrink-0"/> <span className="hidden sm:inline">{t('login')}</span></>)}
                </button>
              </div>
            </div>
          </nav>

          {/* Main Content Area - Full height to avoid page scrolling if possible */}
          <main className={`max-w-[1400px] mx-auto px-3 sm:px-6 py-4 sm:py-6 flex-1 flex flex-col w-full min-h-0 relative z-10 ${sc.state.walletConnected ? 'pb-20 md:pb-6' : ''}`}>
            {!sc.state.walletConnected ? (
              <div className="flex-1 flex flex-col items-center justify-center text-center space-y-6 fade-in h-full min-h-[50vh]">
                <div className="w-24 h-24 sm:w-28 sm:h-28 bg-surface-900 text-brand-400 rounded-3xl flex items-center justify-center border border-brand-500/50 mb-2 shadow-[0_0_40px_rgba(212,175,55,0.2)] relative">
                  <div className="absolute inset-0 bg-brand-500/10 rounded-3xl animate-pulse"></div>
                  <Icon name="shield-check" size={40} className="relative z-10" />
                </div>
                <div className="max-w-md px-4">
                  <h2 className="text-2xl sm:text-3xl font-black text-zinc-100 uppercase tracking-wide">Elite Platform</h2>
                </div>
                <button onClick={handleWalletToggle} className="px-8 py-3.5 bg-gold-gradient text-surface-950 rounded-xl font-black text-xs sm:text-sm uppercase tracking-widest shadow-[0_10px_30px_rgba(212,175,55,0.3)] transition-transform hover:-translate-y-1 flex items-center gap-2">
                   {t('login')} <Icon name="arrow-right" size={18} />
                </button>
              </div>
            ) : (
              view === 'user' ? <UserDashboard t={t} /> :
              view === 'company' ? <CompanyDashboard sc={sc} t={t} /> : 
              <PromoterDashboard sc={sc} t={t} lang={lang} />
            )}
            
            {/* Mobile Bottom Navigation */}
            {sc.state.walletConnected && (
              <div className="md:hidden fixed bottom-3 left-3 right-3 bg-surface-950/95 backdrop-blur-xl border border-surface-800 rounded-xl p-1.5 flex shadow-[0_10px_40px_rgba(0,0,0,0.8)] z-40 gap-1.5 shrink-0">
                <button onClick={() => setView('user')} className={`flex-1 py-3 rounded-lg text-[9px] sm:text-[10px] font-bold uppercase tracking-wider transition-all ${view === 'user' ? 'bg-surface-800 text-brand-400 shadow-sm' : 'text-zinc-500'}`}>{t('user_dash')}</button>
                <button onClick={() => setView('promoter')} className={`flex-1 py-3 rounded-lg text-[9px] sm:text-[10px] font-bold uppercase tracking-wider transition-all ${view === 'promoter' ? 'bg-surface-800 text-brand-400 shadow-sm' : 'text-zinc-500'}`}>{t('partner_dash')}</button>
                <button onClick={() => setView('company')} className={`flex-1 py-3 rounded-lg text-[9px] sm:text-[10px] font-bold uppercase tracking-wider transition-all ${view === 'company' ? 'bg-surface-800 text-brand-400 shadow-sm' : 'text-zinc-500'}`}>{t('company_dash')}</button>
              </div>
            )}
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
