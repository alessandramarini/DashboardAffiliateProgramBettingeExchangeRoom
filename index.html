    /* Base Reset & Typography */
    body, html {
      margin: 0; padding: 0;
      background-color: #020617 !important; color: #f8fafc !important;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;

      -moz-osx-font-smoothing: grayscale;
    }
    #root { min-height: 100vh; display: flex; flex-direction: column; position: relative; }
    
    /* Technical Grid Background */
    .bg-grid-pattern {
      background-image: 
        linear-gradient(to right, rgba(30, 41, 59, 0.15) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(30, 41, 59, 0.15) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    /* Professional Initial Loader */
    .initial-loader {
      display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
      background: #020617; color: #3b82f6; font-weight: bold; letter-spacing: 3px; font-family: monospace;
    }
    .hex-spinner {
      width: 48px; height: 48px; border: 2px solid rgba(59, 130, 246, 0.2);
      border-radius: 8px; position: relative; animation: pulse-border 2s infinite; margin-bottom: 24px;
      display: flex; align-items: center; justify-content: center;
    }
    .hex-inner {
      width: 24px; height: 24px; background: #3b82f6; border-radius: 4px; animation: spin-hexa 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes spin-hexa { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(0.5); } 100% { transform: rotate(360deg) scale(1); } }
    @keyframes pulse-border { 0% { border-color: rgba(59, 130, 246, 0.2); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); } 70% { border-color: rgba(59, 130, 246, 0.6); box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 100% { border-color: rgba(59, 130, 246, 0.2); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }

    /* Custom Scrollbar for Financial Data */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; border: 1px solid #1e293b; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }

    /* Keyframe Animations */
    @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .toast-enter { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
  </style>

                <div className="min-w-0">
                   <p className="text-[9px] uppercase tracking-widest text-slate-500 font-bold truncate">{t('conv_rate')}</p>
                   <p className="text-lg font-mono text-slate-200 font-bold leading-tight">18.5%</p>
                </div>
             </div>
             <div className="bg-surface-900/40 backdrop-blur-sm border border-slate-800/60 rounded-xl p-3 flex items-center gap-3">
                <div className="p-2 bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 rounded-md shrink-0"><Icon name="message-square" size={16} /></div>
                <div className="min-w-0">
                   <p className="text-[9px] uppercase tracking-widest text-slate-500 font-bold truncate">{t('bot_interactions')}</p>
                   <p className="text-lg font-mono text-slate-200 font-bold leading-tight">842</p>
                </div>
             </div>
          </div>

          {/* Main Vault Area */}
          <div className="grid grid-cols-1 lg:grid-cols-12 gap-4 sm:gap-6 pb-20 md:pb-0">
            <div className="lg:col-span-7 flex flex-col gap-4 sm:gap-6">
              <Card className="flex flex-col items-center justify-center text-center p-6 sm:p-10 relative overflow-hidden bg-gradient-to-b from-surface-900/80 to-surface-950/90">
                {/* Background glow */}
                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-secure-500/5 rounded-full blur-3xl pointer-events-none"></div>

                <div className="inline-flex items-center gap-1.5 px-3 py-1 rounded-md bg-surface-950 text-secure-400 text-[10px] font-bold mb-6 border border-secure-500/20 tracking-widest uppercase shadow-inner z-10">
                  <Icon name="lock" size={12} /> {t('vault_available')}
                </div>
                
                <div className="flex flex-col items-center justify-center w-full min-w-0 z-10">
                  <div className="text-4xl sm:text-5xl md:text-6xl font-extrabold text-white mb-2 tracking-tighter font-mono flex items-baseline justify-center truncate w-full drop-shadow-md">
                    {formatSecureCurrency(available, isHidden)} 
                    {!isHidden && <span className="text-lg sm:text-xl text-secure-500 ml-2 font-sans shrink-0 font-semibold">USDT</span>}
                  </div>
                  <button onClick={toggleHidden} className="text-slate-500 hover:text-secure-400 flex items-center gap-1.5 text-[9px] sm:text-[10px] font-bold uppercase tracking-widest transition-colors bg-surface-950 px-2.5 py-1 rounded-md border border-slate-800/80 shadow-inner shrink-0">
                    <Icon name={isHidden ? 'eye' : 'eye-off'} size={12} /> {isHidden ? t('show_balances') : t('hide_balances')}
                  </button>
                </div>

                <p className="text-slate-400/80 mt-6 mb-8 max-w-sm text-[11px] sm:text-xs leading-relaxed z-10">{t('escrow_desc')}</p>
                
                <button onClick={() => { if(available > 0) setShowSecureModal(true); }} disabled={isClaiming || available <= 0} className={`w-full max-w-sm py-3.5 rounded-lg font-bold text-sm flex items-center justify-center gap-2.5 transition-all shadow-xl z-10 uppercase tracking-wide ${available <= 0 ? 'bg-surface-950 text-slate-600 border border-slate-800' : isClaiming ? 'bg-secure-600 text-white cursor-wait' : 'bg-secure-600 hover:bg-secure-500 text-white shadow-[0_0_20px_rgba(16,185,129,0.3)] border border-secure-500/50'}`}>
                  {available <= 0 ? (<><Icon name="lock" size={16} /> <span className="truncate">{t('no_funds')}</span></>) : isClaiming ? (<><Icon name="refresh-cw" size={16} className="animate-spin" /> <span className="truncate">{t('signing')}</span></>) : (<><Icon name="fingerprint" size={20} /> <span className="truncate">{t('unlock_withdraw')}</span></>)}
                </button>
                
                <div className="flex flex-col items-center gap-1.5 mt-6 z-10">
                  <div className="flex items-center gap-1.5 text-[9px] sm:text-[10px] text-slate-500 font-bold uppercase tracking-widest"><Icon name="shield-check" size={12} className="text-secure-500 shrink-0"/> AES-256 SECURE</div>
                  <div className="flex items-center gap-1.5 text-[9px] sm:text-[10px] text-slate-500 uppercase tracking-widest"><Icon name="zap" size={12} className="text-amber-500 shrink-0"/> {t('network_fee')}</div>
                </div>
              </Card>

              <Card className="w-full h-[280px] sm:h-[320px] flex flex-col">
                 <h3 className="text-xs sm:text-sm font-bold text-white mb-4 flex items-center gap-2 uppercase tracking-widest shrink-0 truncate">
                  <Icon name="trending-up" size={16} className="text-secure-400"/> {t('earnings_chart')}
                </h3>
                <div className="flex-1 w-full min-h-0">
                  <ResponsiveContainer width="100%" height="100%">
                    <AreaChart data={localizedChartData} margin={{top: 5, right: 0, left: -25, bottom: 0}}>
                      <defs>
                        <linearGradient id="colorPromoterAmount" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="5%" stopColor="#10b981" stopOpacity={0.4}/>
                          <stop offset="95%" stopColor="#10b981" stopOpacity={0}/>
                        </linearGradient>
                      </defs>
                      <CartesianGrid strokeDasharray="2 2" stroke="#1e293b" vertical={false} />
                      <XAxis dataKey="name" stroke="#64748b" tick={{fill: '#64748b', fontSize: 10, fontFamily:'monospace'}} axisLine={false} tickLine={false} dy={5} />
                      <YAxis stroke="#64748b" tick={{fill: '#64748b', fontSize: 10, fontFamily:'monospace'}} axisLine={false} tickLine={false} />
                      <Tooltip contentStyle={{ backgroundColor: '#0f172a', border: '1px solid #1e293b', borderRadius: '6px', color: '#fff', fontSize:'12px', fontFamily:'monospace' }} itemStyle={{ color: '#34d399', fontWeight: 'bold' }} />
                      <Area type="monotone" dataKey="amount" stroke="#10b981" strokeWidth={2} fillOpacity={1} fill="url(#colorPromoterAmount)" activeDot={{r: 4, fill: '#10b981', stroke: '#fff', strokeWidth: 2}} />
                    </AreaChart>
                  </ResponsiveContainer>
                </div>
              </Card>
            </div>

            <div className="lg:col-span-5 space-y-4 sm:space-y-6">
              <StatCard title={t('lifetime_deposit')} value={`${formatSecureCurrency(lifetime, isHidden)}`} subtext={t('validated_earnings')} icon="database" colorClass="text-secure-400" />
              <Card className="h-[350px] lg:h-[420px] flex flex-col p-0">
                <div className="p-4 border-b border-slate-800/80 flex justify-between items-center bg-surface-900/40 shrink-0">
                  <h3 className="text-white font-bold flex items-center gap-2 text-[11px] sm:text-xs tracking-widest uppercase truncate">
                    <Icon name="list" size={14} className="text-slate-400 shrink-0"/> {t('audit_trail')}
                  </h3>
                  <span className="text-[9px] sm:text-[10px] bg-secure-500/10 text-secure-400 px-1.5 py-0.5 rounded border border-secure-500/20 font-mono shrink-0 uppercase">Verified</span>
                </div>
                <div className="flex-1 p-3 sm:p-4 overflow-y-auto custom-scrollbar">
                  {history.length === 0 ? (
                    <div className="h-full flex flex-col items-center justify-center text-slate-500 text-center">
                      <Icon name="shield-off" size={28} className="mb-2 opacity-20" />
                      <p className="text-[10px] sm:text-[11px] font-bold uppercase tracking-widest">{t('no_tx')}</p>
                    </div>
                  ) : (
                    <div className="space-y-2.5">
                      {history.map((item, idx) => (
                        <div key={idx} className="flex justify-between items-center border-l-2 border-secure-500/50 pl-2.5 bg-surface-950/50 p-2.5 rounded-r-md hover:bg-surface-800/50 transition-colors min-w-0 gap-2 border-y border-r border-slate-800/30">
                          <div className="min-w-0">
                            <p className="text-slate-300 text-[11px] sm:text-xs font-bold truncate">{item.date}</p>
                            <p className="text-[9px] sm:text-[10px] text-slate-500 font-mono mt-0.5 flex items-center gap-1 truncate"><Icon name="check-circle-2" size={10} className="text-secure-500 shrink-0"/> {item.tx}</p>
                          </div>
                          <span className="text-secure-400 font-bold font-mono text-[11px] sm:text-xs shrink-0">+{formatSecureCurrency(item.amount, isHidden)}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </Card>
            </div>
          </div>
          <SecurityModal isOpen={showSecureModal} onClose={() => setShowSecureModal(false)} onConfirm={() => { setShowSecureModal(false); setIsClaiming(true); setTimeout(() => { setIsClaiming(false); onProcessClaim(available); }, 2500); }} amount={available} walletAddress={walletAddress} t={t} />
        </div>
      );
    };

    const App = () => {
      const [lang, setLang] = useState('en');
      const [view, setView] = useState('promoter');
      const [wallet, setWallet] = useState({ connected: false, address: null });
      const [toasts, setToasts] = useState([]);
      const [isBalanceHidden, setIsBalanceHidden] = useState(true);
      const [idleTime, setIdleTime] = useState(0);
      const [isLocked, setIsLocked] = useState(false);
      const [isTestnet, setIsTestnet] = useState(false);
      const [isInitLoad, setIsInitLoad] = useState(true);

      const contractAddress = "0xTON_SPLIT_v1...8A2B"; 
      const [contractBalance, setContractBalance] = useState(3200.50);
      const [totalProcessed, setTotalProcessed] = useState(12450.00);
      const [activePromoters, setActivePromoters] = useState(142);
      const [chartData, setChartData] = useState(RAW_REVENUE_DATA);

      const [promoterAvailable, setPromoterAvailable] = useState(450.00);
      const [promoterLifetime, setPromoterLifetime] = useState(3250.00);
      const [claimHistory, setClaimHistory] = useState([
        { date: '12 Mag 2026', amount: 120.00, tx: '0xTX...4f2' }, { date: '05 Mag 2026', amount: 300.00, tx: '0xTX...9x1' }
      ]);

      // Detect language on load
      useEffect(() => {
        const browserLang = (navigator.language || navigator.userLanguage).split('-')[0].toLowerCase();
        if (['en', 'es', 'pt', 'it'].includes(browserLang)) setLang(browserLang);
        setTimeout(() => setIsInitLoad(false), 800); // Simulate secure boot
      }, []);

      const t = useCallback((key) => translations[lang]?.[key] || translations['en'][key] || key, [lang]);
      const addToast = useCallback((title, message, type = 'info') => {
        const id = Date.now() + Math.random(); setToasts(prev => [...prev, { id, title, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000); 
      }, []);

      // Inactivity Timer
      useEffect(() => {
        if (!wallet.connected) return;
        const timer = setInterval(() => {
          setIdleTime(prev => {
            const next = prev + 1;
            if (next === 60 && !isLocked) setIsLocked(true); 
            if (next >= 300) {
              setWallet({ connected: false, address: null }); setIsLocked(false);
              addToast(t('session_ended'), t('session_ended_desc'), "error"); return 0;
            }
            return next;
          });
        }, 1000);
        const resetTimer = () => { if(!isLocked) setIdleTime(0); };
        ['mousemove', 'keydown', 'touchstart'].forEach(e => window.addEventListener(e, resetTimer));
        return () => { clearInterval(timer); ['mousemove', 'keydown', 'touchstart'].forEach(e => window.removeEventListener(e, resetTimer)); };
      }, [wallet.connected, isLocked, addToast, t]);

      const toggleWallet = () => {
        if (wallet.connected) {
          setWallet({ connected: false, address: null }); setIdleTime(0); setIsLocked(false); setIsBalanceHidden(true);
          addToast(t('disconnected'), t('disconnected_desc'), "info");
        } else {
          setWallet({ connected: true, address: view === 'company' ? "0xCORP_ADMIN...77Xz" : "0xPARTNER_NODE...99Xz" });
          setIdleTime(0); setIsBalanceHidden(true); addToast(t('connected'), t('connected_desc'), "success");
        }
      };

      const handleProcessClaim = (amount) => {
        setPromoterAvailable(0); setPromoterLifetime(prev => prev + amount); setContractBalance(prev => Math.max(0, prev - amount));
        const dateStr = new Date().toLocaleDateString(lang === 'en' ? 'en-US' : lang === 'it' ? 'it-IT' : 'es-ES', { day: '2-digit', month: 'short', year: 'numeric' });
        setClaimHistory(prev => [{ date: dateStr, amount: amount, tx: '0xTX' + Math.random().toString(16).substring(2,8).toUpperCase() }, ...prev]);
        addToast(t('transfer_auth'), t('funds_sent'), "success");
      };

      const handleSimulateDeposit = () => {
        const deposit = parseFloat((Math.random() * 900 + 100).toFixed(2)); 
        setTotalProcessed(prev => prev + deposit); setContractBalance(prev => prev + (deposit*0.3));
        setChartData(prev => { const newData = [...prev]; newData[newData.length - 1].amount += deposit; return newData; });
        setPromoterAvailable(prev => prev + (deposit*0.5)); addToast(t('deposit_detected'), t('vault_updated'), "info");
      };

      if (isInitLoad) return <div className="initial-loader fade-in"><div className="hex-spinner"><div className="hex-inner"></div></div><div className="text-[10px] text-slate-500 mt-2 font-mono">ESTABLISHING SECURE CONNECTION...</div></div>;

      return (
        <div className="bg-grid-pattern min-h-screen flex flex-col fade-in">
          <ToastContainer toasts={toasts} />
          <LockScreenModal isLocked={isLocked} onUnlock={() => {setIsLocked(false); setIdleTime(0);}} t={t} />

          {/* Secure Header */}
          <nav className="bg-surface-900/80 backdrop-blur-xl border-b border-slate-800/80 sticky top-0 z-40 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 h-14 sm:h-16 flex items-center justify-between gap-2">
              
              <div className="flex items-center gap-2 sm:gap-3 min-w-0">
                <div className="relative w-7 h-7 sm:w-9 sm:h-9 rounded-md overflow-hidden shrink-0 border border-brand-500/30">
                   <div className="absolute inset-0 bg-brand-600 flex items-center justify-center z-0">
                      <Icon name="shield" size={16} className="text-white" />
                   </div>
                   {/* Logo image with fallback to icon */}
                   <img src="logo-tondo.jpeg" alt="Logo" className="absolute inset-0 w-full h-full object-cover z-10 transition-opacity" onError={(e) => { e.currentTarget.style.display = 'none'; }} />
                </div>
                <div className="min-w-0 flex flex-col justify-center">
                  <h1 className="text-[11px] sm:text-sm font-extrabold tracking-widest text-slate-100 leading-tight truncate uppercase">{t('app_title')}</h1>
                  <span className="text-[8px] sm:text-[9px] text-brand-400 font-bold tracking-widest uppercase truncate block font-mono">Secure Terminal</span>
                </div>
              </div>

              <div className="flex items-center gap-2 shrink-0">
                <div className="flex items-center bg-surface-950 border border-slate-700/80 rounded-md px-1.5 py-1 shadow-inner h-7 sm:h-8">
                  <Icon name="globe" size={12} className="text-slate-500 mx-1 hidden sm:block" />
                  <select value={lang} onChange={e => setLang(e.target.value)} className="bg-transparent text-slate-300 text-[10px] sm:text-xs font-bold outline-none cursor-pointer uppercase">
                    <option value="en">EN</option><option value="es">ES</option><option value="pt">PT</option><option value="it">IT</option>
                  </select>
                </div>

                {wallet.connected && (
                  <div className="hidden md:flex items-center bg-surface-950 border border-slate-700/80 rounded-md p-0.5 h-8">
                    <button onClick={() => {setView('promoter'); setWallet(w => ({...w, address: "0xPARTNER_NODE...99Xz"}));}} className={`px-3 h-full text-[10px] font-bold rounded-sm transition-colors uppercase tracking-wider ${view === 'promoter' ? 'bg-surface-800 text-white shadow-sm' : 'text-slate-500 hover:text-slate-300'}`}>{t('partner_dash')}</button>
                    <button onClick={() => {setView('company'); setWallet(w => ({...w, address: "0xCORP_ADMIN...77Xz"}));}} className={`px-3 h-full text-[10px] font-bold rounded-sm transition-colors uppercase tracking-wider ${view === 'company' ? 'bg-surface-800 text-white shadow-sm' : 'text-slate-500 hover:text-slate-300'}`}>{t('company_dash')}</button>
                  </div>
                )}

                <button onClick={toggleWallet} className={`flex items-center gap-1.5 px-3 sm:px-4 h-7 sm:h-8 rounded-md font-bold text-[10px] sm:text-xs transition-colors border shadow-sm min-w-0 uppercase tracking-wider ${wallet.connected ? 'bg-surface-950 border-slate-700/80 text-slate-300 hover:bg-slate-800 hover:text-white' : 'bg-brand-600 border-brand-500 text-white hover:bg-brand-500 shadow-brand-900/20'}`}>
                  {wallet.connected ? (<><Icon name="power" size={12} className="text-red-400 shrink-0"/><span className="truncate hidden sm:inline">{wallet.address.substring(0,6)}</span></>) : (<><Icon name="key" size={12} className="shrink-0"/> <span className="truncate">{t('secure_login')}</span></>)}
                </button>
              </div>
            </div>
            {/* Status Bar */}
            <div className="w-full bg-surface-950 border-b border-slate-800/50 py-0.5 flex justify-center items-center">
              <p className="text-[8px] sm:text-[9px] font-mono text-slate-500 flex items-center gap-2 tracking-widest uppercase">
                <span className="w-1.5 h-1.5 rounded-full bg-secure-500 animate-pulse"></span>
                System Online | {t('e2e_encryption')} | Latency: 12ms | IP: 192.168.*.*
              </p>
            </div>
          </nav>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex-1 w-full relative z-10">
            {!wallet.connected ? (
              <div className="flex flex-col items-center justify-center h-[70vh] text-center space-y-6 fade-in">
                <div className="w-20 h-20 sm:w-24 sm:h-24 bg-surface-900 text-brand-500 rounded-2xl flex items-center justify-center border border-slate-700/80 shadow-2xl relative">
                  <div className="absolute inset-0 bg-brand-500/5 rounded-2xl animate-pulse"></div>
                  <Icon name="shield" size={40} className="sm:w-[48px] sm:h-[48px]"/>
                </div>
                <div className="max-w-md px-4">
                  <h2 className="text-xl sm:text-2xl font-extrabold text-white mb-3 uppercase tracking-widest leading-tight">{t('restricted_access')}</h2>
                  <p className="text-slate-400 text-[11px] sm:text-xs leading-relaxed font-mono">{t('restricted_desc')}</p>
                </div>
                <button onClick={toggleWallet} className="px-6 sm:px-8 py-3.5 bg-brand-600 hover:bg-brand-500 text-white rounded-lg font-bold text-xs sm:text-sm shadow-lg shadow-brand-900/30 transition-all hover:-translate-y-0.5 flex items-center justify-center gap-2 uppercase tracking-wide border border-brand-500/50">
                  <Icon name="fingerprint" size={18} /> {t('start_secure_conn')}
                </button>
              </div>
            ) : (
              view === 'company' ? 
                <CompanyDashboard contractAddress={contractAddress} isTestnet={isTestnet} toggleNetwork={()=>setIsTestnet(!isTestnet)} contractBalance={contractBalance} totalProcessed={totalProcessed} activePromoters={activePromoters} chartData={chartData} onSimulateDeposit={handleSimulateDeposit} isHidden={isBalanceHidden} toggleHidden={() => setIsBalanceHidden(!isBalanceHidden)} t={t} /> : 
                <PromoterDashboard walletAddress={wallet.address} available={promoterAvailable} lifetime={promoterLifetime} history={claimHistory} onProcessClaim={handleProcessClaim} addToast={addToast} isHidden={isBalanceHidden} toggleHidden={() => setIsBalanceHidden(!isBalanceHidden)} lang={lang} t={t} />
            )}
            
            {/* Mobile Bottom Nav */}
            {wallet.connected && (
              <div className="md:hidden fixed bottom-4 left-4 right-4 bg-surface-900/90 backdrop-blur-xl border border-slate-700/80 rounded-xl p-1.5 flex shadow-2xl z-40 gap-1.5">
                <button onClick={() => {setView('promoter'); setWallet(w => ({...w, address: "0xPARTNER_NODE...99Xz"}));}} className={`flex-1 py-2.5 rounded-lg text-[10px] font-bold transition-colors uppercase tracking-wider truncate px-1 border ${view === 'promoter' ? 'bg-brand-600 text-white border-brand-500/50' : 'text-slate-400 border-transparent hover:bg-surface-800'}`}>{t('partner_dash')}</button>
                <button onClick={() => {setView('company'); setWallet(w => ({...w, address: "0xCORP_ADMIN...77Xz"}));}} className={`flex-1 py-2.5 rounded-lg text-[10px] font-bold transition-colors uppercase tracking-wider truncate px-1 border ${view === 'company' ? 'bg-brand-600 text-white border-brand-500/50' : 'text-slate-400 border-transparent hover:bg-surface-800'}`}>{t('company_dash')}</button>
              </div>
            )}
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
