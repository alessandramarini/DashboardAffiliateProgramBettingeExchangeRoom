<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Betting Exchange Room - Secure Treasury</title>
  
  <meta name="theme-color" content="#020617">

  <style>
    body, html {
      margin: 0;
      padding: 0;
      background-color: #020617 !important; /* Slate 950 */
      color: #f8fafc !important; /* Slate 50 */
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    #root { min-height: 100vh; display: flex; flex-direction: column; }
    .initial-loader {
      display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
      background: #020617; color: #3b82f6; font-weight: bold; letter-spacing: 2px;
    }
    .spinner {
      width: 40px; height: 40px; border: 4px solid rgba(59, 130, 246, 0.3);
      border-radius: 50%; border-top-color: #3b82f6; animation: spin 1s ease-in-out infinite; margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    @media (min-width: 640px) { .custom-scrollbar::-webkit-scrollbar { width: 6px; } }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #334155; }
  </style>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { bank: { 900: '#0a0f1c', 800: '#111827', accent: '#2563eb' } } } }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js"></script>
</head>
<body class="bg-slate-950 text-slate-200 selection:bg-blue-500/30">
  <div id="root">
    <div class="initial-loader">
      <div class="spinner"></div>
      <div>ESTABLISHING SECURE CONNECTION...</div>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo } = React;
    const { 
      AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, BarChart, Bar
    } = window.Recharts || window.Recharts; 

    // Custom Lucide Icon Component wrapper
    const Icon = ({ name, size = 24, className = '', ...props }) => {
      const iconRef = useRef(null);
      useEffect(() => {
        if (iconRef.current && window.lucide) {
          iconRef.current.innerHTML = '';
          const icon = lucide.createIcons({
            icons: { [name]: window.lucide.icons[name] },
            nameAttr: 'data-lucide',
            attrs: { width: size, height: size, class: className, ...props }
          });
          lucide.createIcons({ root: iconRef.current });
        }
      }, [name, size, className, props]);
      return <i ref={iconRef} data-lucide={name} className={className} style={{ display: 'inline-flex', width: size, height: size }}></i>;
    };

    const translations = {
      en: {
        app_title: "BETTING EXCHANGE ROOM", partner_dash: "Partner Dashboard", company_dash: "Treasury",
        secure_login: "Secure Login", logout: "Secure Logout", session_ended: "Session Terminated",
        session_ended_desc: "Security protocol engaged: disconnected due to inactivity.",
        locked: "Session Locked", locked_desc: "Enter PIN to resume secure session.",
        disconnected: "Disconnected", disconnected_desc: "Encrypted session successfully closed.",
        connected: "Secure Connection", connected_desc: "E2E Authenticated. IP Logged.",
        show_balances: "Show Balances", hide_balances: "Hide Balances", network: "Network",
        restricted_access: "Restricted Banking Area",
        restricted_desc: "Military-grade encrypted environment for BETTING EXCHANGE ROOM fund management. Hardware wallet auth required.",
        start_secure_conn: "Authenticate Device", e2e_encryption: "AES-256 E2E Encryption Active",
        treasury_center: "Treasury Operations Center", vault_id: "Vault Contract ID:",
        usdt_master: "USDT Master:", usdt_wallet: "Vault USDT Jetton:", simulate_deposit: "Simulate Deposit (USDT)",
        processed_volume: "Processed Volume", real_usdt: "Real USDT", company_reserve: "Company Reserve (30%)",
        withdrawable_funds: "Secure withdrawable funds", active_nodes: "Active Promoter Nodes",
        registered_pools: "Registered Pool 1 & 2", cash_flow: "Cash Flow (7 Days)", secure_conn_badge: "BANK-GRADE SECURE",
        smart_contract_rules: "Smart Contract Routing", immutable: "IMMUTABLE", quota: "Quota",
        company_share: "Company", leader_pool: "Sponsor", base_pool: "Bonus Pool", destination: "Dest:",
        verified_partner_area: "Verified Partner Area", copy_link: "Copy Link", copied: "Copied",
        copied_secure: "Copied to Secure Clipboard", copied_secure_desc: "Link protected. Clipboard clears in 30s.",
        copy_error: "Copy Error", vault_available: "Vault Available Funds",
        escrow_desc: "Funds protected in zero-knowledge escrow by Smart Contract. Signature required.",
        no_funds: "No unlockable funds", signing: "Verifying cryptographic signature...",
        unlock_withdraw: "Sign & Withdraw to Wallet", network_fee: "Est. Network Fees: ~0.05 TON",
        lifetime_deposit: "Lifetime Deposit", validated_earnings: "Total validated earnings",
        audit_trail: "Immutable Audit Trail", latest_tx: "Latest Tx", no_tx: "No transfers recorded.",
        security_auth: "Hardware Authorization", crypto_signature_req: "Cryptographic signature required for Vault Smart Contract interaction.",
        requested_amount: "Requested Amount:", dest_wallet: "Destination Wallet:", enter_pin: "Enter Security PIN",
        cancel: "Abort", signing_btn: "Signing...", sign_withdraw_btn: "Authorize Transfer",
        transfer_auth: "Transfer Authorized", funds_sent: "USDT securely sent to verified wallet.",
        deposit_detected: "Deposit Detected", vault_updated: "Vault updated: USDT received on-chain.",
        mon: "Mon", tue: "Tue", wed: "Wed", thu: "Thu", fri: "Fri", sat: "Sat", today: "Today",
        unlock_session: "Unlock Session", session_locked_warn: "For your security, the session was locked after 1 minute of inactivity.",
        earnings_chart: "Earnings Overview"
      },
      it: {
        app_title: "BETTING EXCHANGE ROOM", partner_dash: "Dashboard Partner", company_dash: "Tesoreria",
        secure_login: "Login Bancario", logout: "Disconnessione Sicura", session_ended: "Sessione Terminata",
        session_ended_desc: "Protocollo di sicurezza: disconnessione per inattività.",
        locked: "Sessione Bloccata", locked_desc: "Inserisci il PIN per riprendere la sessione sicura.",
        disconnected: "Disconnesso", disconnected_desc: "Sessione criptata conclusa con successo.",
        connected: "Connessione Protetta", connected_desc: "Autenticato E2E. IP Registrato.",
        show_balances: "Mostra Saldi", hide_balances: "Nascondi Saldi", network: "Rete",
        restricted_access: "Area Bancaria Riservata",
        restricted_desc: "Ambiente con crittografia militare per la gestione dei fondi BETTING EXCHANGE ROOM. Autenticazione hardware richiesta.",
        start_secure_conn: "Autentica Dispositivo", e2e_encryption: "Crittografia AES-256 Attiva",
        treasury_center: "Centro Operativo Tesoreria", vault_id: "Vault Contract ID:",
        usdt_master: "USDT Master:", usdt_wallet: "Vault USDT Jetton:", simulate_deposit: "Simula Incasso (USDT)",
        processed_volume: "Volume Processato", real_usdt: "USDT Reali", company_reserve: "Riserva Aziendale (30%)",
        withdrawable_funds: "Fondi sicuri prelevabili", active_nodes: "Nodi Promotori Attivi",
        registered_pools: "Pool 1 & 2 registrati", cash_flow: "Flusso di Cassa (7 Giorni)", secure_conn_badge: "SICUREZZA BANCARIA",
        smart_contract_rules: "Routing Smart Contract", immutable: "IMMUTABILE", quota: "Quota",
        company_share: "Azienda", leader_pool: "Sponsor", base_pool: "Pool Bonus", destination: "Dest:",
        verified_partner_area: "Area Partner Verificata", copy_link: "Copia Link", copied: "Copiato",
        copied_secure: "Copiato in Sicurezza", copied_secure_desc: "Appunti protetti. Si cancelleranno in 30s.",
        copy_error: "Errore di Copia", vault_available: "Vault Fondi Disponibili",
        escrow_desc: "Fondi protetti in escrow (Zero-Knowledge). Firma necessaria per sblocco.",
        no_funds: "Nessun fondo sbloccabile", signing: "Verifica firma crittografica...",
        unlock_withdraw: "Firma e Preleva", network_fee: "Commissioni Network stimate: ~0.05 TON",
        lifetime_deposit: "Lifetime Deposit", validated_earnings: "Guadagno totale validato",
        audit_trail: "Registro Audit Immutabile", latest_tx: "Ultime Trx", no_tx: "Nessun trasferimento registrato.",
        security_auth: "Autorizzazione Hardware", crypto_signature_req: "Firma crittografica richiesta per l'interazione con il Vault Smart Contract.",
        requested_amount: "Importo richiesto:", dest_wallet: "Wallet Destinazione:", enter_pin: "Inserisci PIN di Sicurezza",
        cancel: "Annulla", signing_btn: "Firma in corso...", sign_withdraw_btn: "Autorizza Trasferimento",
        transfer_auth: "Trasferimento Autorizzato", funds_sent: "USDT inviati in sicurezza al wallet verificato.",
        deposit_detected: "Deposito Rilevato", vault_updated: "Vault aggiornato: USDT ricevuti on-chain.",
        mon: "Lun", tue: "Mar", wed: "Mer", thu: "Gio", fri: "Ven", sat: "Sab", today: "Oggi",
        unlock_session: "Sblocca Sessione", session_locked_warn: "Per la tua sicurezza, la sessione è stata bloccata dopo 1 minuto di inattività.",
        earnings_chart: "Panoramica Guadagni"
      }
    };

    const RAW_REVENUE_DATA = [
      { rawKey: 'mon', amount: 120 }, { rawKey: 'tue', amount: 250 }, { rawKey: 'wed', amount: 180 }, 
      { rawKey: 'thu', amount: 300 }, { rawKey: 'fri', amount: 450 }, { rawKey: 'sat', amount: 600 }, { rawKey: 'today', amount: 550 },
    ];
    
    const PROMOTER_CHART_DATA = [
      { rawKey: 'mon', amount: 45 }, { rawKey: 'tue', amount: 120 }, { rawKey: 'wed', amount: 80 }, 
      { rawKey: 'thu', amount: 210 }, { rawKey: 'fri', amount: 150 }, { rawKey: 'sat', amount: 320 }, { rawKey: 'today', amount: 280 },
    ];

    const RAW_SPLIT_DATA = [
      { rawKey: 'company_share', value: 30, color: '#3b82f6', address: 'INSERISCI_INDIRIZZO_COMPANY' },
      { rawKey: 'leader_pool', value: 50, color: '#10b981', address: 'INSERISCI_INDIRIZZO_POOL_1' },
      { rawKey: 'base_pool', value: 20, color: '#f59e0b', address: 'INSERISCI_INDIRIZZO_POOL_2' },
    ];

    const Card = ({ children, className = '' }) => (
      <div className={`relative bg-slate-900/50 backdrop-blur-xl border border-slate-800 rounded-2xl p-4 sm:p-6 shadow-2xl hover:border-slate-700 transition-all duration-300 overflow-hidden ${className}`}>
        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-blue-500/20 to-transparent"></div>
        {children}
      </div>
    );

    const StatCard = ({ title, value, subtext, icon, colorClass }) => (
      <Card>
        <div className="flex justify-between items-start">
          <div className="flex-1 overflow-hidden pr-2">
            <p className="text-slate-400 font-bold mb-1 uppercase tracking-widest text-[10px] sm:text-xs truncate">{title}</p>
            <h3 className="text-2xl sm:text-3xl font-extrabold text-white mb-2 tracking-tight font-mono truncate">{value}</h3>
            <div className={`inline-flex items-center gap-1 text-[10px] sm:text-xs px-2 py-1 rounded bg-slate-950 border border-slate-800 break-words font-medium ${colorClass}`}>
              {subtext}
            </div>
          </div>
          <div className={`p-3 rounded-xl bg-slate-950 border border-slate-800 shadow-inner flex-shrink-0 ${colorClass}`}>
            <Icon name={icon} size={24} />
          </div>
        </div>
      </Card>
    );

    const ToastContainer = ({ toasts }) => (
      <div className="fixed bottom-4 right-4 sm:bottom-6 sm:right-6 z-[200] flex flex-col gap-2 sm:gap-3 pointer-events-none max-w-[calc(100vw-32px)]">
        {toasts.map(toast => (
          <div key={toast.id} className="pointer-events-auto flex items-center gap-3 bg-slate-900 border border-slate-700 text-white px-3 sm:px-4 py-3 rounded-xl shadow-2xl shadow-black/80 backdrop-blur-md animate-in slide-in-from-right-4 fade-in duration-300">
            <div className={`p-1.5 rounded-lg flex-shrink-0 ${toast.type === 'success' ? 'bg-emerald-500/20 text-emerald-400' : toast.type === 'error' ? 'bg-red-500/20 text-red-400' : 'bg-blue-500/20 text-blue-400'}`}>
              <Icon name={toast.type === 'success' ? 'check-circle-2' : toast.type === 'error' ? 'alert-circle' : 'shield-check'} size={18} />
            </div>
            <div className="overflow-hidden min-w-0">
              <p className="text-sm font-bold truncate">{toast.title}</p>
              {toast.message && <p className="text-xs text-slate-400 mt-0.5 truncate">{toast.message}</p>}
            </div>
          </div>
        ))}
      </div>
    );

    const formatSecureCurrency = (amount, isHidden) => {
      if (isHidden) return '••••••';
      return amount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    };

    const SecurityModal = ({ isOpen, onClose, onConfirm, amount, walletAddress, t }) => {
      const [pin, setPin] = useState('');
      const [isSigning, setIsSigning] = useState(false);
      if (!isOpen) return null;
      const handleConfirm = () => {
        setIsSigning(true);
        setTimeout(() => { setIsSigning(false); onConfirm(); setPin(''); }, 2000);
      };
      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950/90 backdrop-blur-xl p-4">
          <div className="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-md shadow-[0_0_50px_rgba(37,99,235,0.15)] overflow-hidden">
            <div className="bg-slate-800/50 p-6 border-b border-slate-700 flex flex-col items-center text-center">
              <div className="w-16 h-16 bg-slate-950 rounded-full border-2 border-blue-500 flex items-center justify-center text-blue-500 mb-4 shadow-[0_0_20px_rgba(37,99,235,0.3)]">
                <Icon name="fingerprint" size={32} />
              </div>
              <h3 className="text-xl font-bold text-white uppercase tracking-widest">{t('security_auth')}</h3>
              <p className="text-xs text-slate-400 mt-2 px-4">{t('crypto_signature_req')}</p>
            </div>
            <div className="p-6 space-y-5">
              <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 shadow-inner font-mono">
                <div className="flex justify-between items-center text-sm mb-3 pb-3 border-b border-slate-800/50">
                  <span className="text-slate-400">{t('requested_amount')}</span>
                  <span className="text-emerald-400 font-bold text-lg">{amount.toLocaleString('en-US', {minimumFractionDigits:2})} USDT</span>
                </div>
                <div className="flex justify-between items-center text-sm overflow-hidden">
                  <span className="text-slate-400 flex-shrink-0">{t('dest_wallet')}</span>
                  <span className="text-slate-300 text-xs bg-slate-900 px-2 py-1 rounded border border-slate-800 truncate ml-2">{walletAddress}</span>
                </div>
              </div>
              <div className="space-y-2">
                <label className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                  <Icon name="key-round" size={14} /> {t('enter_pin')}
                </label>
                <input type="password" value={pin} onChange={(e) => setPin(e.target.value.replace(/[^0-9]/g, ''))} placeholder="••••••" maxLength={6} className="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white text-center tracking-[1em] focus:outline-none focus:border-blue-500 transition-all font-mono text-xl shadow-inner" />
              </div>
              <div className="flex gap-3 pt-2">
                <button onClick={onClose} disabled={isSigning} className="flex-1 py-3 rounded-xl font-semibold text-slate-300 bg-slate-800 hover:bg-slate-700 transition-colors disabled:opacity-50 text-sm">{t('cancel')}</button>
                <button onClick={handleConfirm} disabled={isSigning || pin.length < 4} className="flex-1 py-3 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-500 transition-all flex items-center justify-center gap-2 disabled:opacity-50 text-sm shadow-[0_0_15px_rgba(59,130,246,0.3)]">
                  {isSigning ? <Icon name="refresh-cw" size={18} className="animate-spin" /> : <Icon name="shield-check" size={18} />}
                  <span className="truncate">{isSigning ? t('signing_btn') : t('sign_withdraw_btn')}</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const LockScreenModal = ({ isLocked, onUnlock, t }) => {
      const [pin, setPin] = useState('');
      if (!isLocked) return null;
      const handleUnlock = () => {
        if(pin.length >= 4) { onUnlock(); setPin(''); }
      };
      return (
        <div className="fixed inset-0 z-[150] flex items-center justify-center bg-slate-950/95 backdrop-blur-2xl p-4">
          <div className="max-w-sm w-full flex flex-col items-center text-center">
            <div className="w-20 h-20 bg-slate-900 rounded-full border-4 border-slate-800 flex items-center justify-center text-blue-500 mb-6 relative">
              <div className="absolute inset-0 bg-blue-500/20 rounded-full animate-ping"></div>
              <Icon name="lock" size={36} />
            </div>
            <h2 className="text-2xl font-bold text-white mb-2 tracking-widest uppercase">{t('locked')}</h2>
            <p className="text-slate-400 text-sm mb-8">{t('session_locked_warn')}</p>
            
            <div className="w-full space-y-4">
              <input type="password" value={pin} onChange={(e) => setPin(e.target.value.replace(/[^0-9]/g, ''))} placeholder="PIN" maxLength={6} className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-4 text-white text-center tracking-[1em] focus:outline-none focus:border-blue-500 transition-all font-mono text-xl shadow-inner" />
              <button onClick={handleUnlock} disabled={pin.length < 4} className="w-full py-4 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-500 transition-all flex items-center justify-center gap-2 disabled:opacity-50 text-base shadow-lg shadow-blue-900/20">
                <Icon name="unlock" size={20} /> {t('unlock_session')}
              </button>
            </div>
          </div>
        </div>
      );
    };

    const CompanyDashboard = ({ contractAddress, contractBalance, totalProcessed, activePromoters, chartData, onSimulateDeposit, isHidden, toggleHidden, isTestnet, toggleNetwork, t }) => {
      const [isSimulating, setIsSimulating] = useState(false);
      const simulationTimeoutRef = useRef(null);

      const usdtMaster = isTestnet ? "EQBfBWT7X2BSIhu9pGpuLWZbD50nEIGI1p2Hn3H3H3H3H3H3" : "EQCvxJy4eG8hyHBFsZ7eePxrRsUQSFE_jpptRAYBmcG_DOGS";
      const contractUsdtWallet = isTestnet ? "EQ_Testnet_Wallet_4kLp..." : "EQ_Mainnet_Wallet_9mXq...";

      const handleDeposit = () => {
        setIsSimulating(true);
        simulationTimeoutRef.current = setTimeout(() => { onSimulateDeposit(); setIsSimulating(false); }, 1200);
      };
      useEffect(() => { return () => clearTimeout(simulationTimeoutRef.current); }, []);

      const localizedChartData = useMemo(() => chartData.map(d => ({...d, name: t(d.rawKey)})), [chartData, t]);
      const localizedSplitData = useMemo(() => RAW_SPLIT_DATA.map(d => ({...d, name: t(d.rawKey)})), [t]);

      return (
        <div className="space-y-6">
          <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center bg-slate-900/70 border border-slate-700 rounded-2xl p-5 shadow-2xl gap-4">
            <div className="w-full lg:w-auto overflow-hidden">
              <div className="flex items-center gap-3 mb-3">
                <div className="p-2 bg-blue-500/10 rounded-lg text-blue-500 border border-blue-500/30">
                  <Icon name="server" size={24} />
                </div>
                <h2 className="text-xl sm:text-2xl font-bold text-white uppercase tracking-widest truncate">{t('treasury_center')}</h2>
              </div>
              <div className="flex flex-col gap-1.5 mt-2 border-l-2 border-blue-500/50 pl-3">
                <p className="text-xs text-slate-400 flex items-center gap-2"><span className="w-24 font-bold">{t('vault_id')}</span><span className="font-mono text-slate-300 bg-slate-950 px-2 py-0.5 rounded truncate">{contractAddress}</span></p>
                <p className="text-xs text-slate-400 flex items-center gap-2"><span className="w-24 font-bold">{t('usdt_master')}</span><span className="font-mono text-emerald-400 bg-slate-950 px-2 py-0.5 rounded truncate">{usdtMaster}</span></p>
                <p className="text-xs text-slate-400 flex items-center gap-2"><span className="w-24 font-bold">{t('usdt_wallet')}</span><span className="font-mono text-blue-400 bg-slate-950 px-2 py-0.5 rounded truncate">{contractUsdtWallet}</span></p>
              </div>
            </div>
            <div className="w-full lg:w-auto flex flex-col sm:flex-row gap-3">
              <button onClick={toggleNetwork} className={`px-4 py-3 rounded-xl text-xs font-bold border transition-all flex items-center justify-center gap-2 ${isTestnet ? 'bg-amber-500/10 border-amber-500/50 text-amber-500' : 'bg-slate-800 border-slate-600 text-slate-300 hover:bg-slate-700'}`}>
                <Icon name="network" size={16} /> {isTestnet ? 'TESTNET ACTIVE' : 'SWITCH TO TESTNET'}
              </button>
              <button onClick={handleDeposit} disabled={isSimulating} className="px-5 py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl text-sm font-bold flex items-center justify-center gap-2 disabled:opacity-50 shadow-[0_0_15px_rgba(37,99,235,0.4)]">
                {isSimulating ? <Icon name="refresh-cw" size={18} className="animate-spin" /> : <Icon name="plus" size={18} />}
                {t('simulate_deposit')}
              </button>
            </div>
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <StatCard title={t('processed_volume')} value={`${formatSecureCurrency(totalProcessed, isHidden)}`} subtext={<><Icon name="trending-up" size={12}/>{t('real_usdt')}</>} icon="activity" colorClass="text-emerald-400" />
            <StatCard title={t('company_reserve')} value={`${formatSecureCurrency(contractBalance, isHidden)}`} subtext={t('withdrawable_funds')} icon="wallet" colorClass="text-blue-500" />
            <StatCard title={t('active_nodes')} value={activePromoters.toString()} subtext={t('registered_pools')} icon="users" colorClass="text-indigo-400" />
          </div>

          <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">
            <Card className="xl:col-span-2">
              <div className="flex justify-between items-center mb-6">
                <h3 className="text-lg font-bold text-white flex items-center gap-2 uppercase tracking-wide">
                  <Icon name="activity" size={18} className="text-blue-500"/> {t('cash_flow')}
                </h3>
                <span className="text-xs font-mono px-2 py-1 bg-emerald-500/10 text-emerald-400 rounded border border-emerald-500/30 flex items-center gap-1">
                  <Icon name="shield-check" size={12}/> {t('secure_conn_badge')}

              </div>
              <div className="h-72 w-full">
                <ResponsiveContainer width="100%" height="100%">

                      <linearGradient id="colorAmount" x1="0" y1="0" x2="0" y2="1">

                    <Area type="monotone" dataKey="amount" stroke="#3b82f6" strokeWidth={3} fillOpacity={1} fill="url(#colorAmount)" activeDot={{r: 6, fill: '#3b82f6', stroke: '#fff', strokeWidth: 2}} />

              </div>

            <Card>
              <h3 className="text-lg font-bold text-white mb-6 flex items-center gap-2 uppercase tracking-wide">
                <Icon name="network" size={18} className="text-blue-500"/> {t('smart_contract_rules')}
              </h3>
              <div className="h-40 w-full flex justify-center items-center relative">
                <ResponsiveContainer width="100%" height="100%">
                  <PieChart>
                    <Pie data={localizedSplitData} cx="50%" cy="50%" innerRadius="60%" outerRadius="80%" paddingAngle={5} dataKey="value" stroke="none">
                      {localizedSplitData.map((entry, index) => <Cell key={`cell-${index}`} fill={entry.color} />)}
                    </Pie>
                    <Tooltip contentStyle={{ backgroundColor: '#0f172a', border: '1px solid #1e293b', borderRadius: '8px' }} itemStyle={{ fontWeight: 'bold', color:'#fff' }} formatter={(value) => [`${value}%`, t('quota')]}/>
                  </PieChart>

                <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                  <Icon name="lock" size={20} className="text-slate-400 mb-1 opacity-50"/>
                  <span className="text-xs text-slate-400 font-bold tracking-widest">{t('immutable')}</span>
                </div>
              </div>
              
              <div className="space-y-2 mt-6">
                {localizedSplitData.map((item, idx) => (
                  <div key={idx} className="flex flex-col text-sm p-3 rounded-xl bg-slate-950 border border-slate-800 gap-1.5">
                    <div className="flex justify-between items-center w-full">
                      <div className="flex items-center gap-2">
                        <div className="w-2 h-2 rounded-full shadow-sm" style={{ backgroundColor: item.color, boxShadow: `0 0 8px ${item.color}` }}></div>
                        <span className="text-white font-bold">{item.name}</span>
                      </div>
                      <span className="text-white font-mono font-bold bg-slate-900 px-2 py-0.5 rounded border border-slate-700 text-xs">{item.value}%</span>
                    </div>
                    <div className="flex items-center justify-between text-[10px] text-slate-500 font-mono">

                      <span className="truncate max-w-[150px]">{item.address}</span>

    };

    const PromoterDashboard = ({ walletAddress, available, lifetime, history, onProcessClaim, addToast, isHidden, toggleHidden, t }) => {
      const [isClaiming, setIsClaiming] = useState(false);
      const [copied, setCopied] = useState(false);
      const [showSecureModal, setShowSecureModal] = useState(false);

      const localizedChartData = useMemo(() => PROMOTER_CHART_DATA.map(d => ({...d, name: t(d.rawKey)})), [t]);

      const executeSecureClaim = () => {
        setShowSecureModal(false);
        setIsClaiming(true);
        setTimeout(() => { setIsClaiming(false); onProcessClaim(available); }, 2500);
      };

      const copyReferral = () => {
        const textToCopy = `https://tonpull.app/ref/${walletAddress.substring(0,8)}`;
        navigator.clipboard.writeText(textToCopy).then(() => {
          setCopied(true);
          addToast(t('copied_secure'), t('copied_secure_desc'), "success");
          setTimeout(() => setCopied(false), 2000);
        }).catch(() => addToast(t('copy_error'), "", "error"));
      };

      return (
        <div className="space-y-6 max-w-6xl mx-auto">
          <div className="flex flex-col lg:flex-row items-center justify-between bg-slate-900/70 border border-slate-700 rounded-2xl p-5 shadow-2xl gap-4">
            <div className="flex items-center gap-4 w-full lg:w-auto">
              <div className="w-14 h-14 rounded-full bg-slate-950 border-2 border-emerald-500/50 flex items-center justify-center text-emerald-500 shadow-inner">
                <Icon name="user-circle" size={28} />
              </div>
              <div className="overflow-hidden">
                <h2 className="text-xl font-bold text-white uppercase tracking-widest truncate">{t('verified_partner_area')}</h2>
                <div className="flex items-center gap-2 mt-1 bg-slate-950 px-2 py-1 rounded w-fit border border-slate-800">
                  <Icon name="shield-check" size={12} className="text-blue-500" />
                  <p className="text-blue-400 font-mono text-xs truncate">{walletAddress}</p>
                </div>
              </div>
            </div>
            <div className="bg-slate-950 p-1.5 rounded-xl border border-slate-800 flex items-center shadow-inner w-full lg:w-auto">
              <div className="px-4 py-2 text-xs font-mono text-slate-500 truncate flex-1 lg:max-w-[200px]">.../ref/{walletAddress.substring(0,8)}</div>
              <button onClick={copyReferral} className={`flex-shrink-0 flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all ${copied ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-800 hover:bg-slate-700 text-white'}`}>
                <Icon name={copied ? 'check-circle-2' : 'copy'} size={16} />
                {copied ? t('copied') : t('copy_link')}
              </button>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            {/* Left Column: Big Balance and Chart */}
            <div className="lg:col-span-7 flex flex-col gap-6">
              <Card className="flex flex-col items-center justify-center text-center p-8 sm:p-12 relative overflow-visible">
                <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-slate-950 text-emerald-400 text-xs font-bold mb-6 border border-emerald-500/30 tracking-widest uppercase shadow-inner">
                  <Icon name="lock" size={14} /> {t('vault_available')}
                </div>
                
                <div className="flex flex-col items-center justify-center w-full group">
                  <div className="text-5xl sm:text-7xl font-extrabold text-white mb-1 tracking-tighter font-mono flex items-baseline justify-center">
                    {formatSecureCurrency(available, isHidden)} 
                    {!isHidden && <span className="text-2xl text-emerald-500 ml-3 font-sans">USDT</span>}
                  </div>
                  
                  {/* Privacy Eye Icon right under the dots/balance */}
                  <button onClick={toggleHidden} className="mt-3 text-slate-500 hover:text-emerald-400 flex items-center gap-1.5 text-xs font-bold uppercase tracking-widest transition-colors bg-slate-950 px-4 py-1.5 rounded-full border border-slate-800 shadow-inner">
                    <Icon name={isHidden ? 'eye' : 'eye-off'} size={14} />
                    {isHidden ? t('show_balances') : t('hide_balances')}
                  </button>
                </div>

                <p className="text-slate-400 mt-8 mb-8 max-w-sm text-sm">{t('escrow_desc')}</p>
                
                <button onClick={() => { if(available > 0) setShowSecureModal(true); }} disabled={isClaiming || available <= 0} className={`w-full max-w-md py-4 rounded-xl font-bold text-lg flex items-center justify-center gap-3 transition-all shadow-xl group ${available <= 0 ? 'bg-slate-950 text-slate-600 border border-slate-800' : isClaiming ? 'bg-emerald-600 text-white cursor-wait' : 'bg-emerald-600 hover:bg-emerald-500 text-white shadow-[0_0_20px_rgba(16,185,129,0.4)]'}`}>
                  {available <= 0 ? (<><Icon name="lock" size={20} /> {t('no_funds')}</>) : isClaiming ? (<><Icon name="refresh-cw" size={20} className="animate-spin" /> {t('signing')}</>) : (<><Icon name="fingerprint" size={24} /> {t('unlock_withdraw')}</>)}
                </button>
                
                <div className="flex flex-col items-center gap-2 mt-8">
                  <div className="flex items-center gap-2 text-xs text-slate-500 font-bold"><Icon name="shield-check" size={14} className="text-emerald-500"/> AES-256 SECURE TRANSFER</div>
                  <div className="flex items-center gap-2 text-xs text-slate-500"><Icon name="zap" size={14} className="text-yellow-600"/> {t('network_fee')}</div>
                </div>
              </Card>

              {/* New Earnings Chart for Promoter */}
              <Card className="w-full h-[320px] flex flex-col">
                 <h3 className="text-lg font-bold text-white mb-6 flex items-center gap-2 uppercase tracking-wide shrink-0">
                  <Icon name="bar-chart-2" size={18} className="text-emerald-500"/> {t('earnings_chart')}
                </h3>
                <div className="flex-1 w-full min-h-0">
                  <ResponsiveContainer width="100%" height="100%">
                    <AreaChart data={localizedChartData} margin={{top: 5, right: 0, left: -20, bottom: 0}}>
                      <defs>
                        <linearGradient id="colorPromoterAmount" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="5%" stopColor="#10b981" stopOpacity={0.3}/>
                          <stop offset="95%" stopColor="#10b981" stopOpacity={0}/>
                        </linearGradient>
                      </defs>
                      <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" vertical={false} />
                      <XAxis dataKey="name" stroke="#64748b" tick={{fill: '#64748b', fontSize: 10}} axisLine={false} tickLine={false} dy={10} />
                      <YAxis stroke="#64748b" tick={{fill: '#64748b', fontSize: 10}} axisLine={false} tickLine={false} dx={-10} width={60} />
                      <Tooltip contentStyle={{ backgroundColor: '#0f172a', border: '1px solid #1e293b', borderRadius: '8px', color: '#fff' }} itemStyle={{ color: '#34d399', fontWeight: 'bold' }} />
                      <Area type="monotone" dataKey="amount" stroke="#10b981" strokeWidth={3} fillOpacity={1} fill="url(#colorPromoterAmount)" activeDot={{r: 6, fill: '#10b981', stroke: '#fff', strokeWidth: 2}} />
                    </AreaChart>
                  </ResponsiveContainer>
                </div>
              </Card>
            </div>

            {/* Right Column: Lifetime Stats and Audit Trail */}
            <div className="lg:col-span-5 space-y-6">
              <StatCard title={t('lifetime_deposit')} value={`${formatSecureCurrency(lifetime, isHidden)}`} subtext={t('validated_earnings')} icon="trending-up" colorClass="text-emerald-400" />
              
              <Card className="h-[500px] flex flex-col p-0">
                <div className="p-5 border-b border-slate-800 flex justify-between items-center bg-slate-900/80 shrink-0">
                  <h3 className="text-white font-bold flex items-center gap-2 text-sm tracking-widest uppercase">
                    <Icon name="database" size={16} className="text-slate-400"/> {t('audit_trail')}
                  </h3>
                  <span className="text-xs bg-slate-950 text-emerald-500 px-2 py-1 rounded border border-emerald-900/50 font-mono">VERIFIED</span>
                </div>
                
                <div className="flex-1 p-5 overflow-y-auto custom-scrollbar">
                  {history.length === 0 ? (
                    <div className="h-full flex flex-col items-center justify-center text-slate-500 text-center">
                      <Icon name="shield-off" size={32} className="mb-2 opacity-30" />
                      <p className="text-sm font-bold uppercase tracking-widest">{t('no_tx')}</p>
                    </div>
                  ) : (
                    <div className="space-y-4">
                      {history.map((item, idx) => (
                        <div key={idx} className="flex justify-between items-center border-l-2 border-emerald-500/50 pl-3 bg-slate-950/50 p-3 rounded-r-lg hover:bg-slate-900 transition-colors">
                          <div>
                            <p className="text-slate-300 text-sm font-bold">{item.date}</p>
                            <p className="text-xs text-slate-500 font-mono mt-1 flex items-center gap-1"><Icon name="check-circle-2" size={12} className="text-emerald-500"/> {item.tx}</p>
                          </div>
                          <span className="text-emerald-400 font-bold font-mono text-sm">+{formatSecureCurrency(item.amount, isHidden)}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </Card>
            </div>
          </div>
          <SecurityModal isOpen={showSecureModal} onClose={() => setShowSecureModal(false)} onConfirm={executeSecureClaim} amount={available} walletAddress={walletAddress} t={t} />
        </div>
      );
    };

    const App = () => {
      const [lang, setLang] = useState('en');
      const [view, setView] = useState('promoter');
      const [wallet, setWallet] = useState({ connected: false, address: null });
      const [toasts, setToasts] = useState([]);
      
      // SECURITY STATES
      const [isBalanceHidden, setIsBalanceHidden] = useState(true); // Default hidden (pallini)
      const [idleTime, setIdleTime] = useState(0);
      const [isLocked, setIsLocked] = useState(false);
      const [isTestnet, setIsTestnet] = useState(false);

      const contractAddress = "EQD_TonPullSplitter_v1_0"; 
      
      const [contractBalance, setContractBalance] = useState(3200.50);
      const [totalProcessed, setTotalProcessed] = useState(12450.00);
      const [activePromoters, setActivePromoters] = useState(142);
      const [chartData, setChartData] = useState(RAW_REVENUE_DATA);

      const [promoterAvailable, setPromoterAvailable] = useState(450.00);
      const [promoterLifetime, setPromoterLifetime] = useState(3250.00);
      const [claimHistory, setClaimHistory] = useState([
        { date: '12 Mag 2026', amount: 120.00, tx: 'EQA...4f2' },
        { date: '05 Mag 2026', amount: 300.00, tx: 'EQB...9x1' }
      ]);

      useEffect(() => {
        const browserLang = (navigator.language || navigator.userLanguage).split('-')[0];
        if (['en', 'it'].includes(browserLang)) setLang(browserLang);
      }, []);

      const t = useCallback((key) => translations[lang]?.[key] || translations['en'][key] || key, [lang]);

      const addToast = useCallback((title, message, type = 'info') => {
        const id = Date.now() + Math.random();
        setToasts(prev => [...prev, { id, title, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 5000); 
      }, []);

      // Inactivity Timer
      useEffect(() => {
        if (!wallet.connected) return;
        const timer = setInterval(() => {
          setIdleTime(prev => {
            const next = prev + 1;
            if (next === 60 && !isLocked) setIsLocked(true); 
            if (next >= 300) {
              setWallet({ connected: false, address: null });
              setIsLocked(false);
              addToast(t('session_ended'), t('session_ended_desc'), "error");
              return 0;
            }
            return next;
          });
        }, 1000);

        const resetTimer = () => { if(!isLocked) setIdleTime(0); };
        window.addEventListener('mousemove', resetTimer);
        window.addEventListener('keydown', resetTimer);
        window.addEventListener('touchstart', resetTimer);

        return () => {
          clearInterval(timer);
          window.removeEventListener('mousemove', resetTimer);
          window.removeEventListener('keydown', resetTimer);
          window.removeEventListener('touchstart', resetTimer);
        };
      }, [wallet.connected, isLocked, addToast, t]);

      const toggleWallet = () => {
        if (wallet.connected) {
          setWallet({ connected: false, address: null });
          setIdleTime(0); setIsLocked(false); setIsBalanceHidden(true);
          addToast(t('disconnected'), t('disconnected_desc'), "info");
        } else {
          const mockAddress = view === 'company' ? "EQ_Company_Admin_77Xz" : "EQ_Promoter_Wallet_99Xz";
          setWallet({ connected: true, address: mockAddress });
          setIdleTime(0); setIsBalanceHidden(true); 
          addToast(t('connected'), t('connected_desc'), "success");
        }
      };

      const handleProcessClaim = (amount) => {
        setPromoterAvailable(0); setPromoterLifetime(prev => prev + amount); setContractBalance(prev => Math.max(0, prev - amount));
        const dateStr = new Date().toLocaleDateString(lang === 'en' ? 'en-US' : 'it-IT', { day: '2-digit', month: 'short', year: 'numeric' });
        setClaimHistory(prev => [{ date: dateStr, amount: amount, tx: 'EQ' + Math.random().toString(36).substring(2,8) }, ...prev]);
        addToast(t('transfer_auth'), t('funds_sent'), "success");
      };

      const handleSimulateDeposit = () => {
        const deposit = parseFloat((Math.random() * 900 + 100).toFixed(2)); 
        setTotalProcessed(prev => prev + deposit); setContractBalance(prev => prev + (deposit*0.3));
        setChartData(prev => {
          const newData = [...prev]; newData[newData.length - 1].amount += deposit; return newData;
        });
        setPromoterAvailable(prev => prev + (deposit*0.5));
        addToast(t('deposit_detected'), t('vault_updated'), "info");
      };

      return (
        <>
          <ToastContainer toasts={toasts} />
          <LockScreenModal isLocked={isLocked} onUnlock={() => {setIsLocked(false); setIdleTime(0);}} t={t} />

          {}
          <nav className="bg-slate-900/90 backdrop-blur-2xl border-b border-slate-800 sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 h-16 sm:h-20 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center shadow-[0_0_15px_rgba(37,99,235,0.5)]">
                  <Icon name="shield-check" size={24} className="text-white" />
                </div>
                <div>
                  <h1 className="text-lg font-extrabold tracking-widest text-white leading-none hidden sm:block">BETTING EXCHANGE</h1>
                  <h1 className="text-lg font-extrabold tracking-widest text-white leading-none sm:hidden">BX ROOM</h1>
                  <span className="text-xs text-blue-500 font-bold tracking-widest uppercase">Treasury Room</span>
                </div>
              </div>

              <div className="flex items-center gap-2 sm:gap-3">
                <div className="flex items-center bg-slate-950 border border-slate-800 rounded-lg px-2 py-1.5 shadow-inner">
                  <Icon name="globe" size={14} className="text-slate-500 mr-1 sm:mr-2" />
                  <select value={lang} onChange={e => setLang(e.target.value)} className="bg-transparent text-white text-xs font-bold outline-none cursor-pointer uppercase">
                    <option value="en">EN</option><option value="it">IT</option>
                  </select>
                </div>

                {wallet.connected && (
                  <>
                    <div className="hidden md:flex items-center bg-slate-950 border border-slate-800 rounded-lg overflow-hidden p-1">
                      <button onClick={() => {setView('promoter'); setWallet(w => ({...w, address: "EQ_Promoter_Wallet_99Xz"}));}} className={`px-4 py-1.5 text-xs font-bold rounded-md transition-all ${view === 'promoter' ? 'bg-slate-800 text-white' : 'text-slate-500 hover:text-white'}`}>{t('partner_dash')}</button>
                      <button onClick={() => {setView('company'); setWallet(w => ({...w, address: "EQ_Company_Admin_77Xz"}));}} className={`px-4 py-1.5 text-xs font-bold rounded-md transition-all ${view === 'company' ? 'bg-slate-800 text-white' : 'text-slate-500 hover:text-white'}`}>{t('company_dash')}</button>
                    </div>
                    {/* Global Eye Icon in Header */}
                    <button onClick={() => setIsBalanceHidden(!isBalanceHidden)} className="p-2 rounded-lg bg-slate-900 border border-slate-700 text-slate-400 hover:text-white transition-colors hidden sm:block" title={isBalanceHidden ? t('show_balances') : t('hide_balances')}>
                      <Icon name={isBalanceHidden ? 'eye-off' : 'eye'} size={18} />
                    </button>
                  </>
                )}

                <button onClick={toggleWallet} className={`flex items-center gap-2 px-3 sm:px-4 py-2 rounded-xl font-bold text-xs sm:text-sm transition-all shadow-lg ${wallet.connected ? 'bg-slate-900 border border-slate-700 text-white hover:bg-slate-800' : 'bg-blue-600 text-white shadow-blue-900/30'}`}>
                  {wallet.connected ? (<><Icon name="log-out" size={16} className="text-red-400"/><span className="hidden sm:inline">{wallet.address.substring(0,4)}...{wallet.address.substring(wallet.address.length-4)}</span></>) : (<><Icon name="fingerprint" size={16} /> <span className="hidden sm:inline">{t('secure_login')}</span><span className="sm:hidden">Login</span></>)}
                </button>
              </div>
            </div>
            <div className="w-full bg-emerald-500/10 border-b border-emerald-500/20 py-1 text-center">
              <p className="text-[10px] font-mono text-emerald-400 flex items-center justify-center gap-2 tracking-widest"><Icon name="shield-check" size={12}/> {t('e2e_encryption')} | SERVER: ONLINE</p>
            </div>
          </nav>

          {}
          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 relative z-10">
            {!wallet.connected ? (
              <div className="flex flex-col items-center justify-center min-h-[60vh] text-center space-y-6">
                <div className="w-28 h-28 bg-slate-900 text-blue-500 rounded-3xl flex items-center justify-center border border-slate-800 shadow-[0_0_50px_rgba(37,99,235,0.15)] relative">
                  <div className="absolute inset-0 bg-blue-500/10 rounded-3xl animate-pulse"></div>
                  <Icon name="shield-check" size={48} />
                </div>
                <div className="max-w-lg">
                  <h2 className="text-3xl font-extrabold text-white mb-4 uppercase tracking-widest">{t('restricted_access')}</h2>
                  <p className="text-slate-400 text-sm leading-relaxed">{t('restricted_desc')}</p>
                </div>
                <button onClick={toggleWallet} className="px-10 py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold text-lg shadow-xl shadow-blue-900/30 transition-all hover:-translate-y-1 flex items-center justify-center gap-3">
                  <Icon name="key-round" size={24} /> {t('start_secure_conn')}
                </button>
              </div>
            ) : (
              view === 'company' ? 
                <CompanyDashboard contractAddress={contractAddress} isTestnet={isTestnet} toggleNetwork={()=>setIsTestnet(!isTestnet)} contractBalance={contractBalance} totalProcessed={totalProcessed} activePromoters={activePromoters} chartData={chartData} onSimulateDeposit={handleSimulateDeposit} isHidden={isBalanceHidden} toggleHidden={() => setIsBalanceHidden(!isBalanceHidden)} t={t} /> : 
                <PromoterDashboard walletAddress={wallet.address} available={promoterAvailable} lifetime={promoterLifetime} history={claimHistory} onProcessClaim={handleProcessClaim} addToast={addToast} isHidden={isBalanceHidden} toggleHidden={() => setIsBalanceHidden(!isBalanceHidden)} t={t} />
            )}
            
            {/* Mobile View Switcher */}
            {wallet.connected && (
              <div className="md:hidden fixed bottom-6 left-4 right-4 bg-slate-900 border border-slate-700 rounded-xl p-1.5 flex shadow-2xl z-40">
                <button onClick={() => {setView('promoter'); setWallet(w => ({...w, address: "EQ_Promoter_Wallet_99Xz"}));}} className={`flex-1 py-3 rounded-lg text-xs font-bold transition-all ${view === 'promoter' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>{t('partner_dash')}</button>
                <button onClick={() => {setView('company'); setWallet(w => ({...w, address: "EQ_Company_Admin_77Xz"}));}} className={`flex-1 py-3 rounded-lg text-xs font-bold transition-all ${view === 'company' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>{t('company_dash')}</button>
              </div>
            )}
          </main>
        </>
      );
    };

    // Remove loading screen and start React
    document.getElementById('root').innerHTML = '';
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
