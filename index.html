    /* Base Reset & Typography */
    body, html {
      margin: 0; padding: 0;
      background-color: #0f172a !important; color: #f8fafc !important;
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    #root { min-height: 100vh; display: flex; flex-direction: column; position: relative; }
    
    /* Subtle Pattern Background (Modern Fintech) */
    .bg-grid-pattern {
      background-image: radial-gradient(rgba(51, 65, 85, 0.2) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* Clean Initial Loader */
    .initial-loader {
      display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
      background: #0f172a; color: #3b82f6; font-weight: 500;
    }
    .spinner-ring {
      width: 48px; height: 48px; border: 3px solid rgba(59, 130, 246, 0.2);
      border-radius: 50%; border-top-color: #3b82f6; animation: spin 1s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Custom Scrollbar */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }

    /* Animations */
    @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .toast-enter { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
  </style>

            {/* Withdrawal History */}
            <Card padding="p-0" className="flex flex-col">
              <div className="p-5 border-b border-slate-800 bg-surface-900/50">
                <h3 className="text-white font-bold">{t('audit_trail')}</h3>
              </div>
              <div className="flex-1 p-5 overflow-y-auto custom-scrollbar h-[300px]">
                {history.length === 0 ? (
                  <div className="h-full flex flex-col items-center justify-center text-slate-500">
                    <Icon name="history" size={32} className="mb-3 opacity-50" />
                    <p className="text-sm font-medium">{t('no_tx')}</p>
                  </div>
                ) : (
                  <div className="space-y-3">
                    {history.map((item, idx) => (
                      <div key={idx} className="flex justify-between items-center bg-surface-950 p-3 rounded-xl border border-slate-800 hover:border-slate-700 transition-colors">
                        <div>
                          <p className="text-slate-200 text-sm font-medium">{item.date}</p>
                          <p className="text-xs text-slate-500 mt-1 font-mono">{item.tx}</p>
                        </div>
                        <span className="text-success-400 font-bold text-sm">+{formatCurrency(item.amount, isHidden)}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </Card>

          </div>
          <SecurityModal isOpen={showSecureModal} onClose={() => setShowSecureModal(false)} onConfirm={() => { setShowSecureModal(false); setIsClaiming(true); setTimeout(() => { setIsClaiming(false); onProcessClaim(available); }, 1500); }} amount={available} walletAddress={walletAddress} t={t} />
        </div>
      );
    };

    const App = () => {
      const [lang, setLang] = useState('en');
      const [view, setView] = useState('promoter');
      const [wallet, setWallet] = useState({ connected: false, address: null });
      const [toasts, setToasts] = useState([]);
      const [isBalanceHidden, setIsBalanceHidden] = useState(false);
      const [idleTime, setIdleTime] = useState(0);
      const [isLocked, setIsLocked] = useState(false);
      const [isTestnet, setIsTestnet] = useState(false);
      const [isInitLoad, setIsInitLoad] = useState(true);

      const contractAddress = "0xTON_SPLIT...8A2B"; 
      const [contractBalance, setContractBalance] = useState(3200.50);
      const [totalProcessed, setTotalProcessed] = useState(12450.00);
      const [activePromoters, setActivePromoters] = useState(142);
      const [chartData, setChartData] = useState(RAW_REVENUE_DATA);

      const [promoterAvailable, setPromoterAvailable] = useState(450.00);
      const [promoterLifetime, setPromoterLifetime] = useState(3250.00);
      const [claimHistory, setClaimHistory] = useState([
        { date: '12 May 2026', amount: 120.00, tx: '0xTX...4f2' }, { date: '05 May 2026', amount: 300.00, tx: '0xTX...9x1' }
      ]);

      useEffect(() => {
        const browserLang = (navigator.language || navigator.userLanguage).split('-')[0].toLowerCase();
        if (['en', 'es', 'pt', 'it'].includes(browserLang)) setLang(browserLang);
        setTimeout(() => setIsInitLoad(false), 600);
      }, []);

      const t = useCallback((key) => translations[lang]?.[key] || translations['en'][key] || key, [lang]);
      const addToast = useCallback((title, message, type = 'info') => {
        const id = Date.now() + Math.random(); setToasts(prev => [...prev, { id, title, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000); 
      }, []);

      useEffect(() => {
        if (!wallet.connected) return;
        const timer = setInterval(() => {
          setIdleTime(prev => {
            const next = prev + 1;
            if (next === 300 && !isLocked) setIsLocked(true); // 5 mins to lock
            if (next >= 1800) { // 30 mins full logout
              setWallet({ connected: false, address: null }); setIsLocked(false);
              addToast(t('session_ended'), t('session_ended_desc'), "info"); return 0;
            }
            return next;
          });
        }, 1000);
        const resetTimer = () => { if(!isLocked) setIdleTime(0); };
        ['mousemove', 'keydown', 'touchstart'].forEach(e => window.addEventListener(e, resetTimer));
        return () => { clearInterval(timer); ['mousemove', 'keydown', 'touchstart'].forEach(e => window.removeEventListener(e, resetTimer)); };
      }, [wallet.connected, isLocked, addToast, t]);

      const toggleWallet = () => {
        if (wallet.connected) {
          setWallet({ connected: false, address: null }); setIdleTime(0); setIsLocked(false); setIsBalanceHidden(false);
          addToast(t('disconnected'), t('disconnected_desc'), "info");
        } else {
          setWallet({ connected: true, address: view === 'company' ? "0xCORP_ADMIN...77Xz" : "0xPARTNER...99Xz" });
          setIdleTime(0); setIsBalanceHidden(false); addToast(t('connected'), t('connected_desc'), "success");
        }
      };

      const handleProcessClaim = (amount) => {
        setPromoterAvailable(0); setPromoterLifetime(prev => prev + amount); setContractBalance(prev => Math.max(0, prev - amount));
        const dateStr = new Date().toLocaleDateString(lang === 'en' ? 'en-US' : lang === 'it' ? 'it-IT' : 'es-ES', { day: '2-digit', month: 'short', year: 'numeric' });
        setClaimHistory(prev => [{ date: dateStr, amount: amount, tx: '0xTX' + Math.random().toString(16).substring(2,8).toUpperCase() }, ...prev]);
        addToast(t('transfer_auth'), t('funds_sent'), "success");
      };

      const handleSimulateDeposit = () => {
        const deposit = parseFloat((Math.random() * 900 + 100).toFixed(2)); 
        setTotalProcessed(prev => prev + deposit); setContractBalance(prev => prev + (deposit*0.3));
        setChartData(prev => { const newData = [...prev]; newData[newData.length - 1].amount += deposit; return newData; });
        setPromoterAvailable(prev => prev + (deposit*0.5)); addToast(t('deposit_detected'), t('vault_updated'), "info");
      };

      if (isInitLoad) return <div className="initial-loader"><div className="spinner-ring"></div><div className="text-sm text-slate-400 mt-2 font-medium">Loading Dashboard...</div></div>;

      return (
        <div className="bg-grid-pattern min-h-screen flex flex-col">
          <ToastContainer toasts={toasts} />
          <LockScreenModal isLocked={isLocked} onUnlock={() => {setIsLocked(false); setIdleTime(0);}} t={t} />

          {/* Header */}
          <nav className="bg-surface-950/80 backdrop-blur-lg border-b border-slate-800 sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between gap-4">
              
              <div className="flex items-center gap-3">
                <div className="relative w-8 h-8 rounded-full overflow-hidden shrink-0 bg-surface-800 border border-slate-700">
                   <Icon name="layers" size={18} className="absolute inset-0 m-auto text-brand-400" />
                   <img src="logo-tondo.jpeg" alt="Logo" className="absolute inset-0 w-full h-full object-cover z-10" onError={(e) => { e.currentTarget.style.display = 'none'; }} />
                </div>
                <h1 className="text-sm sm:text-base font-bold text-white tracking-tight truncate hidden sm:block">{t('app_title')}</h1>
              </div>

              <div className="flex items-center gap-3 shrink-0">
                <div className="flex items-center bg-surface-900 border border-slate-800 rounded-lg px-2 py-1">
                  <Icon name="globe" size={14} className="text-slate-400 mr-1 hidden sm:block" />
                  <select value={lang} onChange={e => setLang(e.target.value)} className="bg-transparent text-slate-300 text-xs font-semibold outline-none cursor-pointer uppercase">
                    <option value="en">EN</option><option value="es">ES</option><option value="pt">PT</option><option value="it">IT</option>
                  </select>
                </div>

                {wallet.connected && (
                  <div className="hidden md:flex items-center bg-surface-900 border border-slate-800 rounded-lg p-1">
                    <button onClick={() => {setView('promoter'); setWallet(w => ({...w, address: "0xPARTNER...99Xz"}));}} className={`px-4 py-1.5 text-xs font-medium rounded-md transition-colors ${view === 'promoter' ? 'bg-surface-800 text-white' : 'text-slate-400 hover:text-white'}`}>{t('partner_dash')}</button>
                    <button onClick={() => {setView('company'); setWallet(w => ({...w, address: "0xCORP_ADMIN...77Xz"}));}} className={`px-4 py-1.5 text-xs font-medium rounded-md transition-colors ${view === 'company' ? 'bg-surface-800 text-white' : 'text-slate-400 hover:text-white'}`}>{t('company_dash')}</button>
                  </div>
                )}

                <button onClick={toggleWallet} className={`flex items-center gap-2 px-4 py-2 rounded-lg font-semibold text-sm transition-colors ${wallet.connected ? 'bg-surface-900 border border-slate-800 text-slate-300 hover:bg-surface-800 hover:text-white' : 'bg-brand-600 text-white hover:bg-brand-500'}`}>
                  {wallet.connected ? (<><Icon name="log-out" size={16} className="text-slate-400 shrink-0"/><span className="hidden sm:inline">{t('logout')}</span></>) : (<><Icon name="log-in" size={16} className="shrink-0"/> <span>{t('login')}</span></>)}
                </button>
              </div>
            </div>
          </nav>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 py-8 flex-1 w-full relative z-10">
            {!wallet.connected ? (
              <div className="flex flex-col items-center justify-center min-h-[60vh] text-center space-y-6 fade-in">
                <div className="w-20 h-20 bg-surface-900 text-brand-500 rounded-2xl flex items-center justify-center border border-slate-800 mb-2">
                  <Icon name="layout-dashboard" size={32} />
                </div>
                <div className="max-w-md">
                  <h2 className="text-2xl font-bold text-white mb-3">{t('welcome_title')}</h2>
                  <p className="text-slate-400 text-sm leading-relaxed">{t('welcome_desc')}</p>
                </div>
                <button onClick={toggleWallet} className="px-8 py-3 bg-brand-600 hover:bg-brand-500 text-white rounded-xl font-bold text-sm shadow-lg shadow-brand-500/20 transition-all hover:-translate-y-0.5 flex items-center gap-2">
                  <Icon name="arrow-right" size={18} /> {t('start_conn')}
                </button>
              </div>
            ) : (
              view === 'company' ? 
                <CompanyDashboard contractAddress={contractAddress} isTestnet={isTestnet} toggleNetwork={()=>setIsTestnet(!isTestnet)} contractBalance={contractBalance} totalProcessed={totalProcessed} activePromoters={activePromoters} chartData={chartData} onSimulateDeposit={handleSimulateDeposit} isHidden={isBalanceHidden} t={t} /> : 
                <PromoterDashboard walletAddress={wallet.address} available={promoterAvailable} lifetime={promoterLifetime} history={claimHistory} onProcessClaim={handleProcessClaim} addToast={addToast} isHidden={isBalanceHidden} toggleHidden={() => setIsBalanceHidden(!isBalanceHidden)} lang={lang} t={t} />
            )}
            
            {/* Mobile View Switcher */}
            {wallet.connected && (
              <div className="md:hidden fixed bottom-6 left-4 right-4 bg-surface-900/95 backdrop-blur-xl border border-slate-800 rounded-xl p-1.5 flex shadow-2xl z-40 gap-1.5">
                <button onClick={() => {setView('promoter'); setWallet(w => ({...w, address: "0xPARTNER...99Xz"}));}} className={`flex-1 py-3 rounded-lg text-xs font-semibold transition-colors ${view === 'promoter' ? 'bg-brand-600 text-white' : 'text-slate-400 hover:bg-surface-800'}`}>{t('partner_dash')}</button>
                <button onClick={() => {setView('company'); setWallet(w => ({...w, address: "0xCORP_ADMIN...77Xz"}));}} className={`flex-1 py-3 rounded-lg text-xs font-semibold transition-colors ${view === 'company' ? 'bg-brand-600 text-white' : 'text-slate-400 hover:bg-surface-800'}`}>{t('company_dash')}</button>
              </div>
            )}
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
