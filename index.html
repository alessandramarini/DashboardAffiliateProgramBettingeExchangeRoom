    }
    .spinner-ring {
      width: 48px; height: 48px; border: 3px solid rgba(212, 175, 55, 0.1);
      border-radius: 50%; border-top-color: #d4af37; animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
      margin-bottom: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #d4af37; }

    @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulseGoldGlow { 0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.6); } 70% { box-shadow: 0 0 0 15px rgba(212, 175, 55, 0); } 100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); } }
    @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    
    .toast-enter { animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .coin-glow { animation: pulseGoldGlow 2s infinite; }
    .coin-spin { animation: spinSlow 10s linear infinite; }
    
    .glass-panel {

                <StatCard title={t('daily_subs')} value="3,105" subtext={t('registered_subtext')} icon="infinity" colorClass="text-purple-400" highlight={true} />
                <StatCard title={t('conv_rate')} value="18.5%" subtext={t('conv_subtext')} icon="pie-chart" colorClass="text-brand-400" />
                <StatCard title={t('bot_interactions')} value="1,240" subtext={t('clicks_subtext')} icon="mouse-pointer-click" colorClass="text-cyan-400" />
              </div>
            </div>

            <div className="lg:col-span-4 flex flex-col gap-4 min-h-0 shrink-0 lg:shrink">
              <Card padding="p-0" className="flex flex-col flex-1 min-h-[250px] lg:min-h-0">
                <div className="p-3 border-b border-surface-800 bg-surface-900/50 flex justify-between items-center shrink-0">
                  <h3 className="text-zinc-100 font-bold uppercase tracking-widest text-[10px] sm:text-xs flex items-center gap-2"><Icon name="network" size={16} className="text-brand-500" /> {t('my_network')}</h3>
                </div>
                <div className="flex-1 w-full overflow-y-auto custom-scrollbar relative bg-surface-950/30">
                  <table className="w-full text-left border-collapse">
                    <thead className="sticky top-0 z-10 bg-surface-900 shadow-md">
                      <tr className="text-[8px] sm:text-[9px] uppercase tracking-wider text-zinc-500 border-b border-surface-800">
                        <th className="px-3 py-2 font-bold">{t('user_col')}</th>
                        <th className="px-3 py-2 font-bold">{t('action_col')}</th>
                        <th className="px-3 py-2 font-bold text-right">{t('vol_col')}</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-surface-800/50">
                      {sortedNetworkData.map((lead, idx) => (
                        <tr key={idx} className="hover:bg-surface-900/50 transition-colors">
                          <td className="px-3 py-2">
                            <div className="flex items-center gap-2">
                               <div className={`p-1.5 rounded-lg shrink-0 border hidden sm:block ${lead.typeKey === 'action_deposit' ? 'bg-success-500/10 text-success-400 border-success-500/30' : 'bg-brand-500/10 text-brand-400 border-brand-500/30'}`}><Icon name={lead.typeKey === 'action_deposit' ? 'coins' : 'user-plus'} size={12} /></div>
                               {lead.flag && <img src={`https://flagcdn.com/${lead.flag}.svg`} alt="flag" className="w-5 h-[14px] object-cover rounded-[1px] shadow-[0_0_2px_rgba(0,0,0,0.5)] shrink-0" />}
                               <div className="min-w-0">
                                 <TgLink username={lead.username} className="text-[9px] sm:text-[10px] truncate" />
                                 <p className="text-[7px] sm:text-[8px] text-zinc-500 uppercase tracking-wider font-bold mt-0.5">{t(lead.timeKey)}</p>
                               </div>
                            </div>
                          </td>
                          <td className="px-3 py-2 text-xs text-zinc-400">
                            <span className={`inline-flex items-center px-1.5 py-0.5 rounded text-[7px] sm:text-[8px] font-black uppercase tracking-wider border ${lead.statusKey === 'status_active' ? 'bg-success-500/10 text-success-400 border-success-500/20' : 'bg-surface-800 text-zinc-500 border-surface-700'}`}>
                              {t(lead.statusKey)}
                            </span>
                          </td>
                          <td className="px-3 py-2 text-right">
                            <span className={`font-mono text-[8px] sm:text-[9px] font-bold ${lead.total_vol > 0 ? 'text-brand-400' : 'text-zinc-500'} whitespace-nowrap`}>
                              {lead.total_vol > 0 ? `${lead.total_vol} USDT` : '-'}
                            </span>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </Card>
              
              <Card padding="p-0" className="flex flex-col flex-1 min-h-[180px] lg:min-h-0 shrink-0">
                <div className="p-3 border-b border-surface-800 bg-surface-900/50 flex justify-between items-center shrink-0">
                  <h3 className="text-zinc-100 font-bold uppercase tracking-widest text-[10px] sm:text-xs flex items-center gap-2"><Icon name="history" size={16} className="text-zinc-500" /> {t('audit_trail')}</h3>
                </div>
                <div className="flex-1 p-3 overflow-y-auto custom-scrollbar min-h-0">
                  {sc.state.claimHistory.length === 0 ? (
                    <div className="h-full flex flex-col items-center justify-center text-zinc-600"><Icon name="history" size={20} className="mb-2 opacity-50" /><p className="text-[9px] font-bold uppercase tracking-widest">{t('no_tx')}</p></div>
                  ) : (
                    <div className="space-y-2">
                      {sc.state.claimHistory.map((item, idx) => (
                        <div key={idx} className="flex justify-between items-center bg-surface-950 p-2 sm:p-2.5 rounded-lg border border-surface-800 hover:border-surface-700 transition-colors">
                          <div>
                            <p className="text-zinc-200 text-[9px] sm:text-[10px] font-bold">{item.date}</p>
                            <p className="text-[7px] sm:text-[8px] text-zinc-500 mt-0.5 font-mono uppercase tracking-widest flex items-center gap-1"><Icon name="check-circle-2" size={8} className="text-success-500"/> {item.tx}</p>
                          </div>
                          <span className="text-success-400 font-black text-[9px] sm:text-[10px] font-mono bg-success-500/10 px-1.5 py-0.5 rounded border border-success-500/20">+{formatCurrency(item.amount, sc.state.isHidden)}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </Card>
            </div>
            
          </div>
          
          <SecurityModal isOpen={showSecureModal} onClose={() => setShowSecureModal(false)} onConfirm={async () => { setShowSecureModal(false); setIsClaiming(true); await sc.processClaim(t); setIsClaiming(false); }} amount={sc.state.promoterAvailable} walletAddress={sc.state.tonWallet || sc.state.walletAddress} t={t} />
          <TonWalletModal isOpen={showWalletModal} onClose={() => setShowWalletModal(false)} onSave={(val) => { sc.setTonWallet(val); sc.addToast(t('toast_success_title'), t('save_wallet'), 'success'); }} currentWallet={sc.state.tonWallet} t={t} />
        </div>
      );
    };

    const useSmartContract = () => {
      const [walletConnected, setWalletConnected] = useState(false);
      const [walletAddress, setWalletAddress] = useState(null);
      const [tonWallet, setTonWalletState] = useState('');
      const [isHidden, setIsHidden] = useState(false);
      const [toasts, setToasts] = useState([]);
      
      const [contractBalance, setContractBalance] = useState(3200.50);
      const [totalProcessed, setTotalProcessed] = useState(12450.00);
      const [activePromoters, setActivePromoters] = useState(142);
      
      const [promoterAvailable, setPromoterAvailable] = useState(450.00);
      const [promoterLifetime, setPromoterLifetime] = useState(3250.00);
      
      const [promoterVolume, setPromoterVolume] = useState(14500); 
      const [tenthPlaceVolume, setTenthPlaceVolume] = useState(15000); 
      const [weeklyPoolTotal, setWeeklyPoolTotal] = useState(8542.00); 

      const [claimHistory, setClaimHistory] = useState([ { date: '12 May 2026', amount: 120.00, tx: '0xTX...4f2' } ]);

      const addToast = useCallback((title, message, type = 'info') => {
        const id = Date.now() + Math.random(); setToasts(prev => [...prev, { id, title, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000); 
      }, []);

      const connect = (role) => {
        setWalletConnected(true);
        setWalletAddress(role === 'company' ? "0xCORP_ADMIN...77Xz" : "0xPARTNER...99Xz");
        setIsHidden(false);
      };

      const disconnect = () => {
        setWalletConnected(false);
        setWalletAddress(null);
        setIsHidden(false);
      };

      const simulateDeposit = (t) => {
        return new Promise(resolve => {
          setTimeout(() => {
            setTotalProcessed(p => p + 150);
            setContractBalance(p => p + 45);
            setPromoterVolume(p => p + 150);
            setWeeklyPoolTotal(p => p + 15);
            addToast(t ? t('toast_dep_title') : "Deposit Detected", t ? t('toast_dep_msg') : "Liquidity updated on-chain.", "info");
            resolve();
          }, 1000);
        });
      };

      const processClaim = (t) => {
        return new Promise(resolve => {
          setTimeout(() => {
            const amount = promoterAvailable;
            setPromoterAvailable(0);
            setPromoterLifetime(p => p + amount);
            setClaimHistory([{ date: new Date().toLocaleDateString('en-GB'), amount, tx: '0xTX...NEW' }, ...claimHistory]);
            addToast(t ? t('toast_auth_title') : "Transfer Auth Success", t ? t('toast_auth_msg') : "Funds sent to your wallet.", "success");
            resolve();
          }, 1500);
        });
      };

      return {
        state: { walletConnected, walletAddress, tonWallet, isHidden, toasts, contractBalance, totalProcessed, activePromoters, promoterAvailable, promoterLifetime, promoterVolume, tenthPlaceVolume, weeklyPoolTotal, claimHistory },
        connect, disconnect, addToast, simulateDeposit, processClaim, toggleHidden: () => setIsHidden(!isHidden), setTonWallet: setTonWalletState
      };
    };

    const App = () => {
      const [lang, setLang] = useState(() => {
        const browserLang = (navigator.language || navigator.userLanguage).split('-')[0].toLowerCase();
        return ['en', 'es', 'pt', 'it'].includes(browserLang) ? browserLang : 'en';
      });
      const [view, setView] = useState('user');
      const [isInitLoad, setIsInitLoad] = useState(true);
      const sc = useSmartContract(); 

      useEffect(() => {
        setTimeout(() => setIsInitLoad(false), 800); 
      }, []);

      const t = useCallback((key) => translations[lang]?.[key] || translations['en'][key] || key, [lang]);

      const handleWalletToggle = () => {
        if (sc.state.walletConnected) {
          sc.disconnect();
          sc.addToast(t('logout'), "", "info");
        } else {
          sc.connect(view);
        }
      };

      if (isInitLoad) return <div className="initial-loader"><div className="spinner-ring"></div><div className="text-xs text-zinc-500 mt-2 font-bold tracking-widest uppercase">Initializing Elite Environment...</div></div>;

      return (
        <div className="bg-grid-pattern h-full flex flex-col overflow-hidden">
          <ToastContainer toasts={sc.state.toasts} />
          
          <nav className="glass-panel border-b border-surface-800 sticky top-0 z-40 shadow-sm shrink-0">
            <div className="max-w-[1400px] mx-auto px-4 sm:px-6 h-12 sm:h-14 flex items-center justify-between gap-2 sm:gap-4">
              <div className="flex items-center gap-2 sm:gap-3 flex-1 min-w-0">
                <div className="relative w-7 h-7 sm:w-9 sm:h-9 rounded-full overflow-hidden shrink-0 border border-brand-500/50 shadow-[0_0_15px_rgba(212,175,55,0.2)] p-0.5 bg-surface-950">
                   <img src="logo-tondo.jpeg" alt="Logo" loading="lazy" className="w-full h-full object-cover rounded-full" onError={(e)=>{e.target.src='https://ui-avatars.com/api/?name=ER&background=18181b&color=d4af37'}} />
                </div>
                <div className="flex flex-col justify-center min-w-0">
                  <h1 className="text-[9px] sm:text-[12px] font-black tracking-widest text-zinc-100 leading-tight uppercase truncate">{t('app_title')}</h1>
                </div>
              </div>

              <div className="flex items-center gap-2 sm:gap-4 shrink-0">
                <LanguageSelector lang={lang} setLang={setLang} />

                {sc.state.walletConnected && (
                  <div className="hidden md:flex items-center bg-surface-950/80 border border-surface-800 rounded-lg p-1 shadow-inner">
                    <button onClick={() => setView('user')} className={`px-3 py-1.5 text-[9px] sm:text-[10px] font-bold uppercase tracking-wider rounded-md transition-all ${view === 'user' ? 'bg-surface-800 text-brand-400 shadow-sm' : 'text-zinc-500 hover:text-zinc-300'}`}>{t('user_dash')}</button>
                    <button onClick={() => setView('promoter')} className={`px-3 py-1.5 text-[9px] sm:text-[10px] font-bold uppercase tracking-wider rounded-md transition-all ${view === 'promoter' ? 'bg-surface-800 text-brand-400 shadow-sm' : 'text-zinc-500 hover:text-zinc-300'}`}>{t('partner_dash')}</button>
                    <button onClick={() => setView('company')} className={`px-3 py-1.5 text-[9px] sm:text-[10px] font-bold uppercase tracking-wider rounded-md transition-all ${view === 'company' ? 'bg-surface-800 text-brand-400 shadow-sm' : 'text-zinc-500 hover:text-zinc-300'}`}>{t('company_dash')}</button>
                  </div>
                )}

                <button onClick={handleWalletToggle} className={`flex items-center gap-1.5 px-3 sm:px-4 py-1.5 sm:py-2 rounded-lg font-black text-[9px] sm:text-[10px] uppercase tracking-wider transition-all shadow-lg ${sc.state.walletConnected ? 'bg-surface-900 border border-surface-700 text-zinc-300 hover:bg-surface-800 hover:text-white' : 'bg-gold-gradient text-surface-950 hover:opacity-90 hover:-translate-y-0.5 shadow-[0_5px_20px_rgba(212,175,55,0.2)]'}`}>
                  {sc.state.walletConnected ? (<><Icon name="log-out" size={12} className="text-zinc-500 shrink-0"/><span className="hidden sm:inline">{t('logout')}</span></>) : (<><Icon name="log-in" size={12} className="shrink-0"/> <span className="hidden sm:inline">{t('login')}</span></>)}
                </button>
              </div>
            </div>
          </nav>

          <main className={`max-w-[1400px] mx-auto px-3 sm:px-6 py-4 flex-1 flex flex-col w-full min-h-0 relative z-10 ${sc.state.walletConnected ? 'pb-20 md:pb-4' : ''}`}>
            {!sc.state.walletConnected ? (
              <div className="flex-1 flex flex-col items-center justify-center text-center space-y-6 fade-in h-full min-h-0">
                <div className="w-20 h-20 sm:w-24 sm:h-24 bg-surface-900 text-brand-400 rounded-3xl flex items-center justify-center border border-brand-500/50 mb-2 shadow-[0_0_40px_rgba(212,175,55,0.2)] relative shrink-0">
                  <div className="absolute inset-0 bg-brand-500/10 rounded-3xl animate-pulse"></div>
                  <Icon name="infinity" size={32} className="relative z-10" />
                </div>
                <div className="max-w-md px-4 shrink-0">
                  <h2 className="text-xl sm:text-2xl font-black text-zinc-100 uppercase tracking-wide">Elite Platform</h2>
                </div>
                <button onClick={handleWalletToggle} className="px-6 py-3 bg-gold-gradient text-surface-950 rounded-xl font-black text-[10px] sm:text-xs uppercase tracking-widest shadow-[0_10px_30px_rgba(212,175,55,0.3)] transition-transform hover:-translate-y-1 flex items-center gap-2 shrink-0">
                   {t('login')} <Icon name="arrow-right" size={14} />
                </button>
              </div>
            ) : (
              view === 'user' ? <UserDashboard t={t} /> :
              view === 'company' ? <CompanyDashboard sc={sc} t={t} /> : 
              <PromoterDashboard sc={sc} t={t} lang={lang} />
            )}
            
            {/* Mobile Bottom Navigation */}
            {sc.state.walletConnected && (
              <div className="md:hidden fixed bottom-3 left-3 right-3 bg-surface-950/95 backdrop-blur-xl border border-surface-800 rounded-xl p-1.5 flex shadow-[0_10px_40px_rgba(0,0,0,0.8)] z-40 gap-1.5 shrink-0">
                <button onClick={() => setView('user')} className={`flex-1 py-2.5 rounded-lg text-[9px] font-bold uppercase tracking-wider transition-all ${view === 'user' ? 'bg-surface-800 text-brand-400 shadow-sm' : 'text-zinc-500'}`}>{t('user_dash')}</button>
                <button onClick={() => setView('promoter')} className={`flex-1 py-2.5 rounded-lg text-[9px] font-bold uppercase tracking-wider transition-all ${view === 'promoter' ? 'bg-surface-800 text-brand-400 shadow-sm' : 'text-zinc-500'}`}>{t('partner_dash')}</button>
                <button onClick={() => setView('company')} className={`flex-1 py-2.5 rounded-lg text-[9px] font-bold uppercase tracking-wider transition-all ${view === 'company' ? 'bg-surface-800 text-brand-400 shadow-sm' : 'text-zinc-500'}`}>{t('company_dash')}</button>
              </div>
            )}
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
