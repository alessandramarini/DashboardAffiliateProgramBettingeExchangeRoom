      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      width: 100%; min-height: 100vh; min-height: 100dvh;
    }
    
    #root { display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
    
    .bg-grid-pattern {
      background-color: #09090b;
      background-image: radial-gradient(rgba(212, 175, 55, 0.07) 1px, transparent 1px), radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 32px 32px, 64px 64px; background-position: 0 0, 16px 16px; position: relative;
    }
    .bg-grid-pattern::before {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 1000px; height: 600px;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, rgba(9, 9, 11, 0) 70%); pointer-events: none; z-index: 0;
    }

    .text-gold-gradient { background: linear-gradient(135deg, #fef08a 0%, #d4af37 50%, #92400e 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .bg-gold-gradient { background: linear-gradient(135deg, #fcd34d 0%, #d4af37 50%, #b45309 100%); }

    .initial-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #09090b; color: #d4af37; z-index: 9999; }
    .spinner-ring { width: 48px; height: 48px; border: 3px solid rgba(212, 175, 55, 0.1); border-radius: 50%; border-top-color: #d4af37; animation: spin 1s linear infinite; margin-bottom: 24px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #d4af37; }

    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .toast-enter { animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    .glass-panel { background: rgba(24, 24, 27, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    .coin-unqualified { filter: grayscale(100%) opacity(0.5); }
    .coin-qualified { filter: grayscale(0%) opacity(1); box-shadow: 0 0 25px rgba(212, 175, 55, 0.5); }
  </style>

      const [isOpen, setIsOpen] = useState(false);
      const currentLang = LANGUAGES.find(l => l.code === lang) || LANGUAGES[0];
      return (

            <div className="flex items-center gap-3 w-full sm:w-auto">
              <div className="w-10 h-10 bg-brand-500/10 rounded-lg flex items-center justify-center text-brand-400 shrink-0 border border-brand-500/20"><Icon name="building" size={20} /></div>
              <h2 className="text-lg sm:text-xl font-black text-zinc-100 truncate uppercase tracking-widest">{t('treasury_center')}</h2>
            </div>
            <button className="w-full sm:w-auto px-5 py-2.5 bg-surface-950 hover:bg-surface-800 border border-surface-700 text-brand-400 rounded-xl text-xs font-black flex items-center justify-center gap-2 uppercase">

              <StatCard title={t('company_reserve')} value={formatCurrency(sc.state.contractBalance, false)} subtext={t('withdrawable_funds')} icon="wallet" colorClass="text-success-400" highlight={true} />
              
              <Card className="flex-1 min-h-[250px]">
                <h3 className="text-xs font-bold text-zinc-100 mb-2 uppercase flex items-center gap-2"><Icon name="globe-2" size={14} className="text-brand-500" /> {t('geo_dist')}</h3>

                    </AreaChart>

              <Card padding="p-0" className="flex-1 overflow-hidden min-h-[300px]">
                <div className="p-4 border-b border-surface-800 bg-surface-900/50 shrink-0"><h3 className="text-zinc-100 font-bold uppercase text-xs flex items-center gap-2"><Icon name="users-2" size={16} className="text-brand-500" /> {t('network_dir')}</h3></div>
                <div className="overflow-y-auto custom-scrollbar p-2">
                  <table className="w-full text-left">
                    <thead><tr className="text-[10px] uppercase text-zinc-500 border-b border-surface-800"><th className="px-3 py-2 font-bold">{t('promoter')}</th><th className="px-3 py-2 font-bold text-right">{t('volume')}</th></tr></thead>
                    <tbody className="divide-y divide-surface-800/50">
                      {NETWORK_MEMBERS.map(member => (
                        <tr key={member.id} className="hover:bg-surface-900/50">
                          <td className="px-3 py-3 flex items-center gap-2"><img src={`https://flagcdn.com/${member.flag}.svg`} className="w-4 h-3 rounded-sm" /><div className="flex flex-col"><span className="text-zinc-100 font-bold text-xs">{member.name}</span><span className="text-[9px] text-zinc-500">{member.username}</span></div></td>
                          <td className="px-3 py-3 font-mono text-success-400 font-bold text-xs text-right">{formatCurrency(member.volume, false)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </Card>
            </div>
          </div>
        </div>
      );
    };

    const PromoterDashboard = ({ sc, t }) => {
      const isQualified = sc.state.globalWeeklyVolume >= sc.state.globalWeeklyTarget;
      
      return (
        <div className="flex flex-col gap-4 fade-in pb-20 md:pb-4 flex-1">
          <div className="grid grid-cols-1 lg:grid-cols-12 gap-4 flex-1">
            
            <div className="lg:col-span-3 flex flex-col gap-4">
              <Card padding="p-4" className="border-l-2 border-l-brand-500">
                <div className="flex items-center gap-3 mb-3">
                  <div className="w-12 h-12 rounded-full bg-surface-950 flex items-center justify-center border border-brand-500/50">
                     <Icon name="user" size={24} className="text-brand-400" />
                  </div>
                  <div className="min-w-0"><h2 className="text-sm font-black text-zinc-100 truncate">Alex De Souza</h2><span className="text-[10px] text-brand-400">@alex_crypto_pro</span></div>
                </div>
              </Card>

              <Card className="flex flex-col items-center justify-center text-center bg-gradient-to-b from-surface-900 to-surface-950 border-t-2 border-t-success-500 p-6">
                <p className="text-[10px] text-zinc-500 font-bold uppercase mb-1">{t('vault_available')}</p>
                <div className="text-3xl font-black text-zinc-100 mb-4 font-mono">{formatCurrency(sc.state.promoterAvailable, false)} USDT</div>
                <button className="w-full py-3 rounded-xl font-black text-xs uppercase bg-success-600 text-white shadow-lg"><Icon name="fingerprint" size={16} className="inline mr-2"/> {t('unlock_withdraw')}</button>
              </Card>

              <Card className={`text-center p-4 border-b-4 ${isQualified ? 'border-brand-500 bg-brand-500/10' : 'border-surface-700'}`}>
                 <h3 className="text-[10px] font-bold uppercase mb-2 flex justify-center items-center gap-1.5"><Icon name="award" size={14} className={isQualified ? 'text-brand-500' : 'text-zinc-500'}/> {t('global_pool')}</h3>
                 <p className="text-xs text-zinc-300 font-mono mb-2">{formatCurrency(sc.state.globalWeeklyVolume, false)} / {formatCurrency(sc.state.globalWeeklyTarget, false)}</p>
                 <div className="h-1.5 w-full bg-surface-950 rounded-full overflow-hidden"><div className="h-full bg-brand-500" style={{width: `${Math.min((sc.state.globalWeeklyVolume/sc.state.globalWeeklyTarget)*100, 100)}%`}}></div></div>
                 <p className="text-[9px] mt-2 text-brand-400 font-bold uppercase">{isQualified ? t('pool_qualified') : t('pool_unqualified')}</p>
              </Card>
            </div>

            <div className="lg:col-span-9 flex flex-col gap-4">
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                <StatCard title={t('lifetime_deposit')} value={formatCurrency(sc.state.promoterLifetime, false)} subtext="USDT" icon="coins" colorClass="text-brand-400" />
                <StatCard title={t('daily_subs')} value="345" subtext="Leads" icon="users" colorClass="text-blue-400" />
              </div>
              <Card className="flex-1 min-h-[300px]">
                <h3 className="text-xs font-bold text-zinc-100 mb-4 uppercase"><Icon name="bar-chart-3" size={16} className="inline text-success-500 mr-2" /> {t('earnings_chart')}</h3>
                <div className="flex-1 w-full min-h-0"><ResponsiveContainer width="100%" height="100%"><AreaChart data={PROMOTER_CHART_DATA}><CartesianGrid strokeDasharray="3 3" stroke="#27272a" vertical={false} /><XAxis dataKey="rawKey" stroke="#71717a" /><YAxis stroke="#71717a" /><Area type="monotone" dataKey="amount" stroke="#10b981" fillOpacity={0.2} fill="#10b981" /></AreaChart></ResponsiveContainer></div>
              </Card>
            </div>
          </div>
        </div>
      );
    };

    const useSmartContract = () => {
      const [walletConnected, setWalletConnected] = useState(false);
      const [contractBalance] = useState(3200.50);
      const [totalProcessed] = useState(12450.00);
      const [activePromoters] = useState(142);
      const [promoterAvailable] = useState(450.00);
      const [promoterLifetime] = useState(3250.00);
      const [globalWeeklyVolume] = useState(85420.00); 
      const [globalWeeklyTarget] = useState(10000.00); 
      return { state: { walletConnected, contractBalance, totalProcessed, activePromoters, promoterAvailable, promoterLifetime, globalWeeklyVolume, globalWeeklyTarget }, connect: () => setWalletConnected(true), disconnect: () => setWalletConnected(false) };
    };

    const App = () => {
      const [lang, setLang] = useState(() => {
        const browserLang = (navigator.language || navigator.userLanguage).split('-')[0].toLowerCase();
        return ['en', 'es', 'pt', 'it'].includes(browserLang) ? browserLang : 'en';
      });
      const [view, setView] = useState('user');
      const [isInitLoad, setIsInitLoad] = useState(true);
      const sc = useSmartContract(); 

      useEffect(() => { setTimeout(() => setIsInitLoad(false), 500); }, []);
      const t = useCallback((key) => translations[lang]?.[key] || translations['en'][key] || key, [lang]);

      if (isInitLoad) return null;

      return (
        <div className="bg-grid-pattern h-full flex flex-col min-h-screen">
          <nav className="glass-panel border-b border-surface-800 sticky top-0 z-40">
            <div className="max-w-[1400px] mx-auto px-4 h-14 sm:h-16 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-8 h-8 rounded-full bg-surface-950 border border-brand-500/50 flex items-center justify-center text-brand-500"><Icon name="shield" size={16} /></div>
                <h1 className="text-[10px] sm:text-[13px] font-black tracking-widest text-zinc-100 uppercase">{t('app_title')}</h1>
              </div>
              <div className="flex items-center gap-3">
                <LanguageSelector lang={lang} setLang={setLang} />
                {sc.state.walletConnected && (
                  <div className="hidden md:flex items-center bg-surface-950 border border-surface-800 rounded-lg p-1">
                    <button onClick={() => setView('user')} className={`px-3 py-1.5 text-[10px] font-bold uppercase rounded-md ${view === 'user' ? 'bg-surface-800 text-brand-400' : 'text-zinc-500'}`}>{t('user_dash')}</button>
                    <button onClick={() => setView('promoter')} className={`px-3 py-1.5 text-[10px] font-bold uppercase rounded-md ${view === 'promoter' ? 'bg-surface-800 text-brand-400' : 'text-zinc-500'}`}>{t('partner_dash')}</button>
                    <button onClick={() => setView('company')} className={`px-3 py-1.5 text-[10px] font-bold uppercase rounded-md ${view === 'company' ? 'bg-surface-800 text-brand-400' : 'text-zinc-500'}`}>{t('company_dash')}</button>
                  </div>
                )}
                <button onClick={() => sc.state.walletConnected ? sc.disconnect() : sc.connect()} className={`px-4 py-2 rounded-lg font-black text-[10px] sm:text-xs uppercase shadow-lg ${sc.state.walletConnected ? 'bg-surface-900 border border-surface-700 text-zinc-300' : 'bg-gold-gradient text-surface-950'}`}>
                  {sc.state.walletConnected ? t('logout') : t('login')}
                </button>
              </div>
            </div>
          </nav>

          <main className="max-w-[1400px] mx-auto px-4 py-6 flex-1 flex w-full">
            {!sc.state.walletConnected ? (
              <div className="flex-1 flex flex-col items-center justify-center text-center space-y-6">
                <div className="w-24 h-24 bg-surface-900 text-brand-400 rounded-3xl flex items-center justify-center border border-brand-500/50"><Icon name="shield-check" size={40} /></div>
                <h2 className="text-2xl font-black text-zinc-100 uppercase">Zero-Trust Environment</h2>
                <button onClick={() => sc.connect()} className="px-8 py-3 bg-gold-gradient text-surface-950 rounded-xl font-black text-xs uppercase shadow-[0_10px_30px_rgba(212,175,55,0.3)]">Connect Wallet</button>
              </div>
            ) : (
              view === 'user' ? <UserDashboard t={t} /> : view === 'company' ? <CompanyDashboard sc={sc} t={t} /> : <PromoterDashboard sc={sc} t={t} />
            )}
          </main>

          {sc.state.walletConnected && (
            <div className="md:hidden fixed bottom-3 left-3 right-3 bg-surface-950/95 backdrop-blur-xl border border-surface-800 rounded-xl p-1 flex shadow-2xl z-40">
              <button onClick={() => setView('user')} className={`flex-1 py-3 rounded-lg text-[9px] font-bold uppercase ${view === 'user' ? 'bg-surface-800 text-brand-400' : 'text-zinc-500'}`}>{t('user_dash')}</button>
              <button onClick={() => setView('promoter')} className={`flex-1 py-3 rounded-lg text-[9px] font-bold uppercase ${view === 'promoter' ? 'bg-surface-800 text-brand-400' : 'text-zinc-500'}`}>{t('partner_dash')}</button>
              <button onClick={() => setView('company')} className={`flex-1 py-3 rounded-lg text-[9px] font-bold uppercase ${view === 'company' ? 'bg-surface-800 text-brand-400' : 'text-zinc-500'}`}>{t('company_dash')}</button>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
