      background-position: 0 0, 16px 16px;
      position: relative;
    }
    .bg-grid-pattern::before {
      content: ''; position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 1000px; height: 600px;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, rgba(9, 9, 11, 0) 70%);
      pointer-events: none; z-index: 0;
    }

    .text-gold-gradient {
      background: linear-gradient(135deg, #fef08a 0%, #d4af37 50%, #92400e 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .bg-gold-gradient { background: linear-gradient(135deg, #fcd34d 0%, #d4af37 50%, #b45309 100%); }

    /* Performance Loaders & Animations */
    .initial-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #09090b; color: #d4af37; font-weight: 500; z-index: 9999; position: fixed; inset: 0; }
    .spinner-ring { width: 48px; height: 48px; border: 3px solid rgba(212, 175, 55, 0.1); border-radius: 50%; border-top-color: #d4af37; animation: spin 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; margin-bottom: 24px; }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Scrollbars invisibili su mobile, compatte su desktop */

    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #d4af37; }
    
    @media (max-width: 768px) {
      .custom-scrollbar::-webkit-scrollbar { display: none; }
      .custom-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    }

    .toast-enter { animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

                              </td>
                              <td className="px-3 py-2 text-xs text-zinc-400">
                                <span className={`inline-flex items-center px-1.5 py-0.5 rounded text-[8px] font-black uppercase tracking-wider border ${lead.statusKey === 'status_active' ? 'bg-success-500/10 text-success-400 border-success-500/20' : 'bg-surface-800 text-zinc-500 border-surface-700'}`}>
                                  {t(lead.statusKey)}
                                </span>
                              </td>
                              <td className="px-3 py-2 text-right">
                                <span className={`font-mono text-[9px] font-bold ${lead.total_vol > 0 ? 'text-brand-400' : 'text-zinc-500'} whitespace-nowrap`}>
                                  {lead.total_vol > 0 ? `${lead.total_vol} USDT` : '-'}
                                </span>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}

                  {activeTab === 'history' && (
                    <div className="flex-1 p-3">
                      {sc.state.claimHistory.length === 0 ? (
                        <div className="h-full flex flex-col items-center justify-center text-zinc-600"><Icon name="history" size={20} className="mb-2 opacity-50" /><p className="text-[9px] font-bold uppercase tracking-widest">{t('no_tx')}</p></div>
                      ) : (
                        <div className="space-y-2">
                          {sc.state.claimHistory.map((item, idx) => (
                            <div key={idx} className="flex justify-between items-center bg-surface-950 p-2.5 rounded-lg border border-surface-800">
                              <div className="min-w-0 pr-2">
                                <p className="text-zinc-200 text-[10px] font-bold truncate">{item.date}</p>
                                <p className="text-[8px] text-zinc-500 mt-0.5 font-mono uppercase tracking-widest flex items-center gap-1 truncate"><Icon name="check-circle-2" size={8} className="text-success-500 shrink-0"/> {item.tx}</p>
                              </div>
                              <span className="text-success-400 font-black text-[10px] font-mono bg-success-500/10 px-1.5 py-0.5 rounded border border-success-500/20 shrink-0">+{formatCurrency(item.amount, sc.state.isHidden)}</span>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </Card>
            </div>
          </div>
          
          <SecurityModal isOpen={showSecureModal} onClose={() => setShowSecureModal(false)} onConfirm={async () => { setShowSecureModal(false); setIsClaiming(true); await sc.processClaim(t); setIsClaiming(false); }} amount={sc.state.promoterAvailable} walletAddress={sc.state.tonWallet || sc.state.walletAddress} t={t} />
          <TonWalletModal isOpen={showWalletModal} onClose={() => setShowWalletModal(false)} onSave={(val) => { sc.setTonWallet(val); sc.addToast(t('toast_success_title'), t('save_wallet'), 'success'); }} currentWallet={sc.state.tonWallet} t={t} />
        </div>
      );
    };

    // --- LOGIC HOOKS ---

    const useSmartContract = () => {
      const [walletConnected, setWalletConnected] = useState(false);
      const [walletAddress, setWalletAddress] = useState(null);
      const [tonWallet, setTonWalletState] = useState('');
      const [isHidden, setIsHidden] = useState(false);
      const [toasts, setToasts] = useState([]);
      
      const [contractBalance, setContractBalance] = useState(3200.50);
      const [totalProcessed, setTotalProcessed] = useState(12450.00);
      const [activePromoters, setActivePromoters] = useState(142);
      
      const [promoterAvailable, setPromoterAvailable] = useState(450.00);
      const [promoterLifetime, setPromoterLifetime] = useState(3250.00);
      
      const [promoterVolume, setPromoterVolume] = useState(14500); 
      const [tenthPlaceVolume, setTenthPlaceVolume] = useState(15000); 
      const [weeklyPoolTotal, setWeeklyPoolTotal] = useState(8542.00); 

      const [claimHistory, setClaimHistory] = useState([ { date: '12 May 2026', amount: 120.00, tx: '0xTX...4f2' } ]);

      const addToast = useCallback((title, message, type = 'info') => {
        const id = Date.now() + Math.random(); setToasts(prev => [...prev, { id, title, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000); 
      }, []);

      const connect = (role) => {
        setWalletConnected(true);
        setWalletAddress(role === 'company' ? "0xCORP_ADMIN...77Xz" : "0xPARTNER...99Xz");
        setIsHidden(false);
      };

      const disconnect = () => {
        setWalletConnected(false);
        setWalletAddress(null);
        setIsHidden(false);
      };

      const simulateDeposit = (t) => {
        return new Promise(resolve => {
          setTimeout(() => {
            setTotalProcessed(p => p + 150);
            setContractBalance(p => p + 45);
            setPromoterVolume(p => p + 150);
            setWeeklyPoolTotal(p => p + 15);
            addToast(t ? t('toast_dep_title') : "Deposit Detected", t ? t('toast_dep_msg') : "Liquidity updated on-chain.", "info");
            resolve();
          }, 1000);
        });
      };

      const processClaim = (t) => {
        return new Promise(resolve => {
          setTimeout(() => {
            const amount = promoterAvailable;
            setPromoterAvailable(0);
            setPromoterLifetime(p => p + amount);
            setClaimHistory([{ date: new Date().toLocaleDateString('en-GB'), amount, tx: '0xTX...NEW' }, ...claimHistory]);
            addToast(t ? t('toast_auth_title') : "Transfer Auth Success", t ? t('toast_auth_msg') : "Funds sent to your wallet.", "success");
            resolve();
          }, 1500);
        });
      };

      return {
        state: { walletConnected, walletAddress, tonWallet, isHidden, toasts, contractBalance, totalProcessed, activePromoters, promoterAvailable, promoterLifetime, promoterVolume, tenthPlaceVolume, weeklyPoolTotal, claimHistory },
        connect, disconnect, addToast, simulateDeposit, processClaim, toggleHidden: () => setIsHidden(!isHidden), setTonWallet: setTonWalletState
      };
    };

    // --- ACCESS GUARD COMPONENT ---
    const AccessDeniedScreen = ({ t, onBypass }) => {
      const [showModal, setShowModal] = useState(false);
      const [pwd, setPwd] = useState('');
      const [error, setError] = useState(false);

      const handleUnlock = () => {
        if (pwd === 'Hpupdsup!1974') {
          setError(false);
          setShowModal(false);
          onBypass();
        } else {
          setError(true);
        }
      };

      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-surface-950 px-4 text-center fade-in z-50 relative">
          <div onClick={() => setShowModal(true)} className="absolute top-8 left-8 w-1.5 h-1.5 bg-zinc-800 rounded-full opacity-50 hover:opacity-100 transition-opacity cursor-pointer"></div>
          
          <div className="w-20 h-20 bg-brand-500/10 text-brand-400 rounded-full flex items-center justify-center border border-brand-500/30 mb-6 shadow-[0_0_30px_rgba(212,175,55,0.2)]">
            <Icon name="lock" size={32} />
          </div>
          <h1 className="text-2xl sm:text-3xl font-black text-zinc-100 uppercase tracking-widest mb-3">{t('access_denied')}</h1>
          <p className="text-sm text-zinc-400 max-w-md mb-8 leading-relaxed">{t('sub_expired')}</p>
          
          <a href="#" className="px-8 py-3.5 bg-gold-gradient text-surface-950 font-black rounded-xl uppercase tracking-widest shadow-[0_10px_30px_rgba(212,175,55,0.3)] transition-transform hover:-translate-y-1 inline-flex items-center gap-2 mb-6">
            <Icon name="zap" size={16} /> {t('renew_btn')}
          </a>
          
          <button onClick={() => setShowModal(true)} className="text-[10px] text-zinc-600 hover:text-brand-400 font-bold uppercase tracking-widest transition-colors cursor-pointer">
            {t('demo_bypass')}
          </button>

          {showModal && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center bg-surface-950/90 backdrop-blur-md p-4 fade-in">
              <div className="glass-panel border-brand-500/30 rounded-2xl w-full max-w-xs shadow-[0_0_50px_rgba(212,175,55,0.1)] p-6">
                <h3 className="text-sm font-black text-zinc-100 mb-4 text-center uppercase tracking-wide">System Admin</h3>
                <input type="password" value={pwd} onChange={e => setPwd(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleUnlock()} placeholder="Password..." className="w-full bg-surface-950 border border-surface-700 rounded-lg px-3 py-2.5 text-zinc-100 mb-3 font-mono focus:outline-none focus:border-brand-500 transition-colors shadow-inner text-xs text-center" />
                {error && <p className="text-red-500 text-[10px] mb-3 text-center uppercase tracking-widest font-bold">Access Denied</p>}
                <div className="flex gap-2 mt-1">
                  <button onClick={() => {setShowModal(false); setPwd(''); setError(false);}} className="flex-1 py-2.5 rounded-lg font-bold text-zinc-400 bg-surface-800 hover:bg-surface-700 transition-colors text-xs uppercase tracking-wider">Cancel</button>
                  <button onClick={handleUnlock} className="flex-1 py-2.5 rounded-lg font-black text-surface-950 bg-gold-gradient hover:opacity-90 transition-opacity shadow-lg uppercase tracking-wider text-xs">Unlock</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // --- MAIN APP COMPONENT ---
    const App = () => {
      const [lang, setLang] = useState(() => {
        const browserLang = (navigator.language || navigator.userLanguage).split('-')[0].toLowerCase();
        return ['en', 'es', 'pt', 'it'].includes(browserLang) ? browserLang : 'en';
      });
      const [view, setView] = useState('user');
      const [isInitLoad, setIsInitLoad] = useState(true);
      const [accessStatus, setAccessStatus] = useState('checking'); 
      
      const sc = useSmartContract(); 
      const t = useCallback((key) => translations[lang]?.[key] || translations['en'][key] || key, [lang]);

      useEffect(() => {
        const verifyAccess = () => {
          const isAdmin = localStorage.getItem('bx_admin') === 'true';
          if (isAdmin) return 'granted';
          
          const expiryStr = localStorage.getItem('bx_access_expiry');
          if (!expiryStr) return 'denied'; 
          
          const expiryTime = parseInt(expiryStr, 10);
          const now = new Date().getTime();
          if (now > expiryTime) return 'denied';
          
          return 'granted';
        };

        setTimeout(() => {
          setAccessStatus(verifyAccess());
          setIsInitLoad(false);
        }, 800);
      }, []);

      const demoBypass = () => {
        const thirtyDaysInMs = 30 * 24 * 60 * 60 * 1000;
        localStorage.setItem('bx_access_expiry', Date.now() + thirtyDaysInMs);
        setAccessStatus('granted');
      };

      const handleWalletToggle = () => {
        if (sc.state.walletConnected) {
          sc.disconnect();
          sc.addToast(t('logout'), "", "info");
        } else {
          sc.connect(view);
        }
      };

      if (isInitLoad) {
        return (
          <div className="initial-loader">
            <div className="spinner-ring"></div>
            <div className="text-[10px] text-zinc-500 mt-2 font-black tracking-widest uppercase">{t('init_env')}</div>
          </div>
        );
      }

      if (accessStatus === 'denied') {
        return <AccessDeniedScreen t={t} onBypass={demoBypass} />;
      }

      return (
        <div className="bg-grid-pattern min-h-screen flex flex-col relative w-full">
          <ToastContainer toasts={sc.state.toasts} />
          
          <nav className="glass-panel border-b border-surface-800 z-50 shadow-sm sticky top-0 w-full shrink-0">
            <div className="max-w-[1400px] mx-auto px-4 h-14 sm:h-16 flex items-center justify-between gap-4">
              <div className="flex items-center gap-3 flex-1 min-w-0">
                <div className="relative w-8 h-8 sm:w-10 sm:h-10 rounded-full overflow-hidden shrink-0 border border-brand-500/50 shadow-[0_0_15px_rgba(212,175,55,0.2)] p-0.5 bg-surface-950">
                   <img src="logo-tondo.jpeg" onError={(e) => e.target.src='https://ui-avatars.com/api/?name=ER&background=18181b&color=d4af37'} alt="Logo" className="w-full h-full object-cover rounded-full" />
                </div>
                <div className="flex flex-col justify-center min-w-0 hidden sm:flex">
                  <h1 className="text-xs font-black tracking-widest text-zinc-100 leading-tight uppercase truncate">{t('app_title')}</h1>
                </div>
              </div>

              <div className="flex items-center gap-3 sm:gap-4 shrink-0">
                <LanguageSelector lang={lang} setLang={setLang} />

                {sc.state.walletConnected && (
                  <div className="hidden md:flex items-center bg-surface-950/80 border border-surface-800 rounded-lg p-1 shadow-inner">
                    <button onClick={() => setView('user')} className={`px-4 py-1.5 text-[10px] font-bold uppercase tracking-wider rounded-md transition-all ${view === 'user' ? 'bg-surface-800 text-brand-400 shadow-sm' : 'text-zinc-500 hover:text-zinc-300'}`}>{t('user_dash')}</button>
                    <button onClick={() => setView('promoter')} className={`px-4 py-1.5 text-[10px] font-bold uppercase tracking-wider rounded-md transition-all ${view === 'promoter' ? 'bg-surface-800 text-brand-400 shadow-sm' : 'text-zinc-500 hover:text-zinc-300'}`}>{t('partner_dash')}</button>
                    <button onClick={() => setView('company')} className={`px-4 py-1.5 text-[10px] font-bold uppercase tracking-wider rounded-md transition-all ${view === 'company' ? 'bg-surface-800 text-brand-400 shadow-sm' : 'text-zinc-500 hover:text-zinc-300'}`}>{t('company_dash')}</button>
                  </div>
                )}

                <button onClick={handleWalletToggle} className={`flex items-center gap-1.5 px-4 py-2 rounded-lg font-black text-[10px] uppercase tracking-wider transition-all shadow-lg ${sc.state.walletConnected ? 'bg-surface-900 border border-surface-700 text-zinc-300 hover:bg-surface-800 hover:text-white' : 'bg-gold-gradient text-surface-950 hover:opacity-90 hover:-translate-y-0.5 shadow-[0_5px_20px_rgba(212,175,55,0.2)]'}`}>
                  {sc.state.walletConnected ? (<><Icon name="log-out" size={12} className="text-zinc-500 shrink-0"/><span className="hidden sm:inline">{t('logout')}</span></>) : (<><Icon name="log-in" size={12} className="shrink-0"/> <span className="hidden sm:inline">{t('login')}</span></>)}
                </button>
              </div>
            </div>
          </nav>

          <main className="max-w-[1400px] mx-auto px-2 sm:px-4 lg:px-6 flex-1 flex flex-col w-full relative z-10 md:pb-4 pb-20">
            {!sc.state.walletConnected ? (
              <div className="flex-1 flex flex-col items-center justify-center text-center space-y-6 fade-in mt-20">
                <div className="w-24 h-24 bg-surface-900 text-brand-400 rounded-3xl flex items-center justify-center border border-brand-500/50 shadow-[0_0_40px_rgba(212,175,55,0.2)] relative">
                  <div className="absolute inset-0 bg-brand-500/10 rounded-3xl animate-pulse"></div>
                  <Icon name="infinity" size={32} className="relative z-10" />
                </div>
                <div className="max-w-md px-4">
                  <h2 className="text-2xl font-black text-zinc-100 uppercase tracking-wide">{t('elite_platform')}</h2>
                </div>
                <button onClick={handleWalletToggle} className="px-8 py-3 bg-gold-gradient text-surface-950 rounded-xl font-black text-xs uppercase tracking-widest shadow-[0_10px_30px_rgba(212,175,55,0.3)] transition-transform hover:-translate-y-1 flex items-center gap-2">
                   {t('login')} <Icon name="arrow-right" size={14} />
                </button>
              </div>
            ) : (
              view === 'user' ? <UserDashboard t={t} lang={lang} /> :
              view === 'company' ? <CompanyDashboard sc={sc} t={t} /> : 
              <PromoterDashboard sc={sc} t={t} lang={lang} />
            )}
            
          </main>
          
          {/* Mobile Bottom Navigation - Fisso e sempre in primo piano */}
          {sc.state.walletConnected && (
            <div className="md:hidden fixed bottom-3 left-3 right-3 bg-surface-950/95 backdrop-blur-xl border border-surface-800 rounded-xl p-1.5 flex shadow-[0_10px_40px_rgba(0,0,0,0.8)] z-50 gap-1.5">
              <button onClick={() => setView('user')} className={`flex-1 py-3 rounded-lg text-[9px] font-bold uppercase tracking-wider transition-all ${view === 'user' ? 'bg-surface-800 text-brand-400 shadow-sm' : 'text-zinc-500'}`}>{t('user_dash')}</button>
              <button onClick={() => setView('promoter')} className={`flex-1 py-3 rounded-lg text-[9px] font-bold uppercase tracking-wider transition-all ${view === 'promoter' ? 'bg-surface-800 text-brand-400 shadow-sm' : 'text-zinc-500'}`}>{t('partner_dash')}</button>
              <button onClick={() => setView('company')} className={`flex-1 py-3 rounded-lg text-[9px] font-bold uppercase tracking-wider transition-all ${view === 'company' ? 'bg-surface-800 text-brand-400 shadow-sm' : 'text-zinc-500'}`}>{t('company_dash')}</button>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
